<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS Study Station</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        :root {
            --mac-radius: 10px;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.5);
            --blur: blur(25px) saturate(180%);
            --accent: #007AFF;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; }

        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden;
            background: url('https://help.apple.com/assets/6656209581E0F57C6C0A1950/6656209881E0F57C6C0A195F/en_US/62f689c836d07466547190f890989f66.png') center/cover no-repeat;
        }

        /* --- SYSTEM MENU BAR --- */
        .menu-bar {
            height: 28px; width: 100%; background: rgba(0, 0, 0, 0.2); backdrop-filter: var(--blur);
            display: flex; align-items: center; padding: 0 15px; color: white; font-size: 13px;
            font-weight: 500; position: fixed; top: 0; z-index: 10000;
        }
        .menu-item { margin-right: 18px; cursor: pointer; }
        .menu-item.bold { font-weight: 700; }
        .apple-logo { font-size: 16px; margin-right: 20px; cursor: pointer; }

        /* --- LAUNCHPAD --- */
        #launchpad {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(40px);
            z-index: 9000; display: none; flex-direction: column; align-items: center; padding-top: 80px;
            opacity: 0; transition: opacity 0.3s ease;
        }
        #launchpad.show { display: flex; opacity: 1; }
        .lp-section-title { color: white; font-size: 18px; font-weight: 300; margin: 40px 0 20px; letter-spacing: 1px; }
        .lp-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 30px; width: 80%; max-width: 800px; justify-items: center; }
        .lp-item { text-align: center; color: white; font-size: 13px; cursor: pointer; transition: transform 0.2s; }
        .lp-item:hover { transform: scale(1.1); }
        .lp-item img { width: 70px; height: 70px; border-radius: 16px; margin-bottom: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .lp-doc-icon { width: 70px; height: 70px; background: white; border-radius: 12px; color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 8px; font-weight: bold;}

        /* --- WINDOW SYSTEM --- */
        .window {
            position: absolute; background: rgba(246, 246, 246, 0.95); backdrop-filter: var(--blur);
            border-radius: var(--mac-radius); border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); display: none; flex-direction: column; overflow: hidden;
            transition: box-shadow 0.2s;
        }
        .window.active { box-shadow: 0 30px 60px rgba(0,0,0,0.5); z-index: 5000 !important; }
        
        /* Traffic Lights & Title Bar */
        .title-bar {
            height: 50px; background: transparent; display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; cursor: default; user-select: none; border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .traffic-lights { display: flex; gap: 8px; width: 60px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        .close { background: #FF5F56; } .min { background: #FFBD2E; } .max { background: #27C93F; }
        .win-title { font-size: 13px; font-weight: 600; color: #444; flex: 1; text-align: center; margin-right: 60px; }

        /* --- APPLE NOTES UI --- */
        .notes-layout { display: flex; height: calc(100% - 50px); }
        .notes-sidebar {
            width: 240px; background: rgba(230, 230, 230, 0.5); border-right: 1px solid rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }
        .notes-toolbar { padding: 10px 15px; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .icon-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #555; transition: 0.2s; }
        .icon-btn:hover { color: var(--accent); }
        
        .notes-list { flex: 1; overflow-y: auto; padding: 10px; }
        .note-cell {
            padding: 12px; border-radius: 8px; margin-bottom: 4px; cursor: pointer; transition: 0.1s;
        }
        .note-cell.active { background: var(--accent); color: white; }
        .note-cell:hover:not(.active) { background: rgba(0,0,0,0.05); }
        .cell-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cell-preview { font-size: 11px; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .notes-editor { flex: 1; background: white; display: flex; flex-direction: column; padding: 0 30px; }
        .editor-date { text-align: center; color: #999; font-size: 11px; padding: 15px 0; }
        #note-title { border: none; outline: none; font-size: 24px; font-weight: 700; color: #222; margin-bottom: 10px; width: 100%; }
        #note-body { border: none; outline: none; font-size: 15px; color: #333; flex: 1; resize: none; line-height: 1.6; width: 100%; }

        /* --- SAFARI UI --- */
        .safari-toolbar {
            height: 40px; background: #f0f0f0; display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #ccc; padding: 0 15px;
        }
        .url-bar {
            width: 60%; background: white; border: 1px solid #ddd; border-radius: 6px; padding: 5px 15px;
            font-size: 13px; text-align: center; outline: none; color: #333;
        }
        .url-bar:focus { border-color: var(--accent); text-align: left; }
        
        /* --- DOCK --- */
        .dock-container {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.2); backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 8px 12px; display: flex; gap: 12px; z-index: 10000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .dock-icon-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .dock-icon { width: 50px; height: 50px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 12px; }
        .dock-icon:hover { transform: scale(1.3) translateY(-10px); }
        .open-dot { width: 4px; height: 4px; background: rgba(0,0,0,0.5); border-radius: 50%; opacity: 0; }
        .open-dot.active { opacity: 1; }
    </style>
</head>
<body>

<div class="menu-bar">
    <span class="apple-logo" onclick="toggleLaunchpad()"></span>
    <span class="menu-item bold" id="active-menu-name">Finder</span>
    <span class="menu-item">File</span>
    <span class="menu-item">Edit</span>
    <span class="menu-item">View</span>
    <span class="menu-item">Window</span>
    <span id="system-clock" style="margin-left: auto;"></span>
</div>

<div id="launchpad" onclick="toggleLaunchpad()">
    <div class="lp-section-title">Applications</div>
    <div class="lp-grid" onclick="event.stopPropagation()">
        <div class="lp-item" onclick="openWindow('notes-app'); toggleLaunchpad()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/30/macOS_Notes_icon.svg">
            <div>Notes</div>
        </div>
        <div class="lp-item" onclick="openWindow('safari-app'); toggleLaunchpad()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/52/Safari_browser_logo.svg">
            <div>Safari</div>
        </div>
    </div>
    
    <div class="lp-section-title" style="margin-top: 60px;">Study Notes</div>
    <div class="lp-grid" id="lp-notes-container" onclick="event.stopPropagation()">
        </div>
</div>

<div id="desktop" style="position: absolute; inset: 28px 0 0 0;">

    <div class="window" id="notes-app" style="width: 850px; height: 550px; top: 50px; left: 100px;">
        <div class="title-bar" onmousedown="focusWindow('notes-app'); dragElement(this.parentElement)">
            <div class="traffic-lights">
                <div class="dot close" onclick="closeWindow('notes-app')"></div>
                <div class="dot min"></div>
                <div class="dot max"></div>
            </div>
            <div class="win-title">Notes</div>
        </div>
        <div class="notes-layout">
            <div class="notes-sidebar">
                <div class="notes-toolbar">
                    <button class="icon-btn" onclick="deleteCurrentNote()" title="Delete Note">🗑️</button>
                    <button class="icon-btn" onclick="createNewNote()" title="New Note">📝</button>
                </div>
                <div class="notes-list" id="sidebar-notes-list">
                    </div>
            </div>
            <div class="notes-editor">
                <div class="editor-date" id="note-date">March 12, 2026 at 10:00 AM</div>
                <input type="text" id="note-title" placeholder="New Note" oninput="saveNote()">
                <textarea id="note-body" placeholder="Start typing... (Use $$ for LaTeX formulas)" oninput="saveNote()"></textarea>
            </div>
        </div>
    </div>

    <div class="window" id="safari-app" style="width: 900px; height: 600px; top: 80px; left: 200px;">
        <div class="title-bar" onmousedown="focusWindow('safari-app'); dragElement(this.parentElement)">
            <div class="traffic-lights">
                <div class="dot close" onclick="closeWindow('safari-app')"></div>
                <div class="dot min"></div>
                <div class="dot max"></div>
            </div>
        </div>
        <div class="safari-toolbar">
            <input type="text" class="url-bar" id="safari-url" value="duckduckgo.com" onkeydown="handleSearch(event)">
        </div>
        <div style="flex: 1; background: white;">
            <iframe id="safari-frame" src="https://duckduckgo.com" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </div>

</div>

<div class="dock-container">
    <div class="dock-icon-wrap">
        <img class="dock-icon" src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" onclick="toggleLaunchpad()" style="background: white; padding: 5px;">
        <div class="open-dot"></div>
    </div>
    <div class="dock-icon-wrap">
        <img class="dock-icon" src="https://upload.wikimedia.org/wikipedia/commons/3/30/macOS_Notes_icon.svg" onclick="openWindow('notes-app')">
        <div class="open-dot" id="dot-notes-app"></div>
    </div>
    <div class="dock-icon-wrap">
        <img class="dock-icon" src="https://upload.wikimedia.org/wikipedia/commons/5/52/Safari_browser_logo.svg" onclick="openWindow('safari-app')">
        <div class="open-dot" id="dot-safari-app"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Your exact config
    const firebaseConfig = {
        apiKey: "AIzaSyAPzgwYDQQqR4y8aRcu8BmXfhYoLPXDuVM",
        authDomain: "forclearpcm.firebaseapp.com",
        projectId: "forclearpcm",
        storageBucket: "forclearpcm.firebasestorage.app",
        messagingSenderId: "313585574692",
        appId: "1:313585574692:web:d4e1262ce22c7cd0bb89b1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let currentNoteId = null;
    let saveTimeout = null;

    // --- 1. REAL-TIME FIREBASE SYNC ---
    onSnapshot(collection(db, "macOS_notes"), (snapshot) => {
        const sidebar = document.getElementById('sidebar-notes-list');
        const lpContainer = document.getElementById('lp-notes-container');
        sidebar.innerHTML = ''; lpContainer.innerHTML = '';
        
        let notesExist = false;

        snapshot.forEach((docSnap) => {
            notesExist = true;
            const data = docSnap.data();
            const title = data.title || "New Note";
            const preview = data.body ? data.body.substring(0, 30) + "..." : "No additional text";
            
            // Build Sidebar Item
            const cell = document.createElement('div');
            cell.className = `note-cell ${docSnap.id === currentNoteId ? 'active' : ''}`;
            cell.innerHTML = `<div class="cell-title">${title}</div><div class="cell-preview">${preview}</div>`;
            cell.onclick = () => loadNoteInEditor(docSnap.id, data);
            sidebar.appendChild(cell);

            // Build Launchpad Item
            const lpItem = document.createElement('div');
            lpItem.className = 'lp-item';
            lpItem.innerHTML = `<div class="lp-doc-icon">📝</div><div>${title}</div>`;
            lpItem.onclick = () => { loadNoteInEditor(docSnap.id, data); openWindow('notes-app'); toggleLaunchpad(); };
            lpContainer.appendChild(lpItem);
        });

        // If no notes, create one automatically
        if (!notesExist) window.createNewNote();
    });

    // --- 2. NOTE MANAGEMENT ---
    window.loadNoteInEditor = (id, data) => {
        currentNoteId = id;
        document.getElementById('note-title').value = data.title || "";
        document.getElementById('note-body').value = data.body || "";
        
        // Update active state in UI
        document.querySelectorAll('.note-cell').forEach(el => el.classList.remove('active'));
        setTimeout(() => { // small delay to let Reactivity render
            const cells = document.querySelectorAll('.note-cell');
            for(let cell of cells) {
                if(cell.querySelector('.cell-title').innerText === (data.title || "New Note")) {
                    cell.classList.add('active'); break;
                }
            }
        }, 50);
        
        // Render MathJax if present
        if(window.MathJax) { MathJax.typesetPromise(); }
    };

    window.createNewNote = () => {
        const newId = "note_" + Date.now();
        currentNoteId = newId;
        document.getElementById('note-title').value = "";
        document.getElementById('note-body').value = "";
        window.saveNote(); // Instantly create in DB
        document.getElementById('note-title').focus();
    };

    window.saveNote = () => {
        if (!currentNoteId) return;
        clearTimeout(saveTimeout);
        
        const title = document.getElementById('note-title').value;
        const body = document.getElementById('note-body').value;
        
        // Save to Firebase after user stops typing for 500ms
        saveTimeout = setTimeout(async () => {
            await setDoc(doc(db, "macOS_notes", currentNoteId), { title, body, timestamp: Date.now() });
        }, 500);
    };

    window.deleteCurrentNote = async () => {
        if (currentNoteId && confirm("Are you sure you want to delete this note?")) {
            await deleteDoc(doc(db, "macOS_notes", currentNoteId));
            currentNoteId = null;
            document.getElementById('note-title').value = "";
            document.getElementById('note-body').value = "";
        }
    };
</script>

<script>
    // --- OS UI LOGIC ---
    let zIndexCounter = 5000;

    function toggleLaunchpad() {
        const lp = document.getElementById('launchpad');
        lp.classList.toggle('show');
    }

    function openWindow(id) {
        const win = document.getElementById(id);
        win.style.display = 'flex';
        document.getElementById('dot-' + id).classList.add('active');
        focusWindow(id);
    }

    function closeWindow(id) {
        document.getElementById(id).style.display = 'none';
        document.getElementById('dot-' + id).classList.remove('active');
    }

    function focusWindow(id) {
        document.querySelectorAll('.window').forEach(w => w.classList.remove('active'));
        const win = document.getElementById(id);
        win.classList.add('active');
        zIndexCounter++;
        win.style.zIndex = zIndexCounter;
        
        // Update Menu Bar Name
        const appName = id === 'notes-app' ? 'Notes' : 'Safari';
        document.getElementById('active-menu-name').innerText = appName;
    }

    // Advanced Window Dragging
    function dragElement(elmnt) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        elmnt.onmousedown = dragMouseDown;

        function dragMouseDown(e) {
            e.preventDefault();
            pos3 = e.clientX; pos4 = e.clientY;
            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;
        }
        function elementDrag(e) {
            e.preventDefault();
            pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
            pos3 = e.clientX; pos4 = e.clientY;
            elmnt.parentElement.style.top = (elmnt.parentElement.offsetTop - pos2) + "px";
            elmnt.parentElement.style.left = (elmnt.parentElement.offsetLeft - pos1) + "px";
        }
        function closeDragElement() {
            document.onmouseup = null; document.onmousemove = null;
        }
    }

    // Safari Logic
    function handleSearch(e) {
        if (e.key === 'Enter') {
            let query = e.target.value;
            // If it's not a URL, search it on DuckDuckGo
            if (!query.includes('.') || query.includes(' ')) {
                document.getElementById('safari-frame').src = `https://duckduckgo.com/?q=${encodeURIComponent(query)}&ia=web`;
            } else {
                if (!query.startsWith('http')) query = 'https://' + query;
                document.getElementById('safari-frame').src = query;
            }
        }
    }

    // Clock
    setInterval(() => {
        const now = new Date();
        document.getElementById('system-clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', weekday: 'short', month: 'short', day: 'numeric'});
    }, 1000);
</script>

</body>
</html>
