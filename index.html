<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Clear PCM – Study Workspace</title>

  <style>
    :root {
      --taskbar-h: 56px;
      --radius: 12px;
      --bg: #070917;
      --panel: rgba(10, 13, 25, .82);
      --panel-strong: rgba(10, 13, 25, .92);
      --line: rgba(255, 255, 255, .14);
      --text: #f4f6ff;
      --muted: rgba(255, 255, 255, .66);
      --accent: #5b8cff;
      --shadow: 0 18px 40px rgba(0,0,0,.42);
      --font: "Inter", -apple-system, system-ui, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: var(--font); background: radial-gradient(circle at 20% 10%, rgba(95, 147, 255, .16), transparent 55%), radial-gradient(circle at 90% 15%, rgba(220, 115, 255, .16), transparent 50%), var(--bg); color: var(--text); overflow: hidden; }
    button, input, textarea { font-family: inherit; }

    #app { height: 100%; display: grid; grid-template-rows: auto 1fr; }

    /* Taskbar */
    #taskbar { height: var(--taskbar-h); padding: 0 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--line); background: rgba(10, 14, 26, .68); backdrop-filter: blur(16px); }
    #brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 14px; }
    #brand .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }

    nav { display: flex; gap: 10px; }
    .tab { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 10px; border: 1px solid transparent; background: rgba(255,255,255,.06); cursor: pointer; transition: background .15s, border .15s; }
    .tab.active { background: rgba(255,255,255,.14); border-color: rgba(255,255,255,.18); }
    .tab svg { width: 16px; height: 16px; fill: currentColor; }

    #tools { display: flex; gap: 10px; align-items: center; }
    .icon-btn { width: 38px; height: 38px; padding: 8px; border-radius: 12px; border: 1px solid transparent; background: rgba(255,255,255,.06); cursor: pointer; display: grid; place-items: center; transition: background .15s, border .15s; }
    .icon-btn:hover { background: rgba(255,255,255,.14); border-color: rgba(255,255,255,.18); }

    /* Main content */
    #main { height: calc(100% - var(--taskbar-h)); position: relative; overflow: hidden; }
    .panel { position: absolute; inset: 0; padding: 14px; display: none; flex-direction: column; gap: 12px; background: var(--panel); border-top: 1px solid var(--line); overflow: hidden; }
    .panel.active { display: flex; }
    .panel-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .panel-title { font-size: 16px; font-weight: 700; letter-spacing: .02em; }
    .panel-subtitle { color: var(--muted); font-size: 13px; }

    .row { display: flex; gap: 10px; align-items: center; }
    .grow { flex: 1; }

    .pill-btn { padding: 10px 14px; border-radius: 999px; border: 1px solid var(--line); background: rgba(255,255,255,.06); cursor: pointer; transition: background .15s, border .15s; }
    .pill-btn:hover { background: rgba(255,255,255,.14); border-color: rgba(255,255,255,.22); }
    .pill-btn.active { background: rgba(91,140,255,.26); border-color: rgba(91,140,255,.46); }

    .card { border-radius: var(--radius); border: 1px solid var(--line); padding: 14px; background: rgba(255,255,255,.05); display: flex; flex-direction: column; gap: 12px; overflow: hidden; }

    /* Bookshelf */
    #bookshelf-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; overflow: auto; padding-bottom: 10px; }
    .book { border-radius: var(--radius); border: 1px solid var(--line); padding: 12px; background: rgba(255,255,255,.04); cursor: pointer; transition: transform .15s, border .15s; text-align: left; }
    .book:hover { transform: translateY(-2px); border-color: rgba(255,255,255,.3); }
    .book-title { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
    .book-meta { font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; gap: 8px; }
    .book-progress { height: 6px; border-radius: 999px; background: rgba(255,255,255,.12); margin-top: 10px; overflow: hidden; }
    .book-progress span { display: block; height: 100%; background: linear-gradient(90deg, #5b8cff, #66ffb2); }

    #reader { display: none; flex-direction: column; border-radius: var(--radius); border: 1px solid var(--line); background: rgba(6,10,22,.78); overflow: hidden; }
    #reader.active { display: flex; }
    #reader-header { padding: 10px; border-bottom: 1px solid var(--line); display: flex; gap: 10px; align-items: center; }
    #reader-title { font-weight: 600; font-size: 14px; }
    #reader-controls { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    #reader-frame { flex: 1; background: #0a0f1d; display: grid; overflow: hidden; }
    #reader-frame iframe, #reader-text { width: 100%; height: 100%; border: none; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--text); background: transparent; padding: 14px; overflow: auto; }
    #reader-text { white-space: pre-wrap; line-height: 1.5; }

    /* Notes */
    #notes { display: grid; grid-template-columns: 320px 1fr; gap: 12px; overflow: hidden; }
    #notes-list { overflow: auto; border-radius: var(--radius); border: 1px solid var(--line); background: rgba(255,255,255,.03); padding: 10px; }
    .note-item { padding: 10px; border-radius: 10px; border: 1px solid transparent; cursor: pointer; text-align: left; }
    .note-item:hover { background: rgba(255,255,255,.08); }
    .note-item.active { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.22); }
    .note-title { font-weight: 600; font-size: 14px; }
    .note-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
    #note-editor { display: flex; flex-direction: column; height: 100%; border-radius: var(--radius); border: 1px solid var(--line); overflow: hidden; background: rgba(255,255,255,.04); }
    #note-editor header { padding: 12px; border-bottom: 1px solid var(--line); display: flex; gap: 10px; align-items: center; }
    #note-editor textarea { flex: 1; padding: 12px; border: none; outline: none; resize: none; background: transparent; color: var(--text); font-size: 14px; line-height: 1.6; }
    #note-editor textarea::placeholder { color: var(--muted); }

    /* Timer */
    #timer { display: grid; grid-template-columns: 1fr minmax(320px, 360px); gap: 14px; overflow: hidden; }
    #timer-main { border-radius: var(--radius); border: 1px solid var(--line); background: rgba(255,255,255,.04); padding: 18px; display: flex; flex-direction: column; gap: 12px; align-items: center; justify-content: center; }
    #timer-label { font-size: 14px; color: var(--muted); }
    #timer-clock { font-size: 64px; font-weight: 700; letter-spacing: .02em; }
    #timer-controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    #timer-presets { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    #timer-notes { border-radius: var(--radius); border: 1px solid var(--line); background: rgba(255,255,255,.04); padding: 14px; overflow: auto; }
    #timer-notes h3 { margin-top: 0; }
    #timer-notes textarea { width: 100%; min-height: 160px; resize: vertical; padding: 10px; border: 1px solid var(--line); border-radius: 10px; background: rgba(0,0,0,.16); color: var(--text); }

    .field { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--line); background: rgba(255,255,255,.05); color: var(--text); outline: none; }
    .field::placeholder { color: var(--muted); }

    @media (max-width: 920px) { #notes { grid-template-columns: 1fr; } #timer { grid-template-columns: 1fr; } }
    @media (max-width: 520px) {
      #taskbar { padding: 0 10px; }
      nav { gap: 6px; }
      .tab { padding: 8px 10px; }
      #bookshelf-grid { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
      #notes { grid-template-columns: 1fr; }
      #timer { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header id="taskbar">
      <div id="brand"><span class="dot"></span><span>For‑Clear PCM</span></div>

      <nav aria-label="Primary tools">
        <button class="tab active" data-tool="bookshelf" title="Bookshelf">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h14a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1zm13 2H6v12h12V6z"></path></svg>
          <span>Bookshelf</span>
        </button>
        <button class="tab" data-tool="notes" title="Notes">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h12a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1zm2 3v2h8V6H8zm0 4v2h8v-2H8zm0 4v2h5v-2H8z"></path></svg>
          <span>Notes</span>
        </button>
        <button class="tab" data-tool="timer" title="Focus Timer">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4a1 1 0 0 1 1 1v1.07a7 7 0 1 1-2 0V5a1 1 0 0 1 1-1zm-5.57 3.64l.7.7A7.01 7.01 0 0 1 5 12a7 7 0 1 0 7-7c-1.54 0-2.96.5-4.11 1.35l-.7-.7A8.96 8.96 0 0 1 12 3c4.97 0 9 4.03 9 9s-4.03 9-9 9-9-4.03-9-9c0-2.36.88-4.52 2.43-6.16z"></path><path d="M13 7h-2v6l5.25 3.15.9-1.48-4.15-2.47V7z"></path></svg>
          <span>Timer</span>
        </button>
      </nav>

      <div id="tools">
        <label class="icon-btn" for="file-upload" title="Upload study files">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 20h14v-2H5v2zm7-18L5.33 9h3.92v4h6.5V9h3.92L12 2z"></path></svg>
          <input id="file-upload" type="file" accept=".pdf,.txt,.md,.html" multiple class="hidden" />
        </label>
        <button class="icon-btn" id="settings-btn" title="Settings">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.14 12.94c.04-.32.06-.66.06-1s-.02-.68-.06-1l2.03-1.58a.5.5 0 0 0 .12-.63l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.04 7.04 0 0 0-1.72-.99l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.63.24-1.23.56-1.77.96l-2.4-.96a.5.5 0 0 0-.6.22l-1.92 3.32a.5.5 0 0 0 .12.63l2.03 1.58c-.04.32-.06.66-.06 1s.02.68.06 1L2.44 14.52a.5.5 0 0 0-.12.63l1.92 3.32c.14.24.44.33.69.22l2.4-.96c.54.4 1.14.72 1.77.96l.36 2.54c.05.26.27.42.5.42h3.84c.23 0 .45-.16.5-.42l.36-2.54c.62-.24 1.22-.56 1.77-.96l2.4.96c.25.1.55.01.69-.22l1.92-3.32a.5.5 0 0 0-.12-.63l-2.03-1.58zM12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7z"></path></svg>
        </button>
      </div>
    </header>

    <main id="main">
      <section id="bookshelf" class="panel active" aria-label="Bookshelf">
        <div class="panel-header">
          <div>
            <div class="panel-title">Bookshelf</div>
            <div class="panel-subtitle">Upload PDFs and text files for reading.</div>
          </div>
          <div class="row">
            <button class="pill-btn" id="clear-books-btn">Clear library</button>
          </div>
        </div>

        <div id="bookshelf-grid" class="card"></div>

        <div id="reader" class="card hidden" aria-label="Reader">
          <div id="reader-header">
            <div id="reader-title">Untitled</div>
            <div id="reader-controls" class="row">
              <button class="pill-btn" id="reader-close">Close</button>
              <button class="pill-btn" id="reader-search">Search</button>
              <input id="reader-search-input" class="field" placeholder="Search (text)" style="max-width:240px; display:none;" />
            </div>
          </div>
          <div id="reader-frame"></div>
        </div>
      </section>

      <section id="notes" class="panel" aria-label="Notes">
        <div class="panel-header">
          <div>
            <div class="panel-title">Notes</div>
            <div class="panel-subtitle">Write and organize what you're learning.</div>
          </div>
          <div class="row">
            <button class="pill-btn" id="new-note">New note</button>
            <button class="pill-btn" id="delete-note">Delete</button>
          </div>
        </div>

        <div id="notes-card" class="card">
          <aside id="notes-list" aria-label="Notes list"></aside>
          <div id="note-editor" aria-label="Note editor">
            <header>
              <input id="note-title" class="field" placeholder="Untitled note" />
            </header>
            <textarea id="note-body" placeholder="Write your thoughts..."></textarea>
          </div>
        </div>
      </section>

      <section id="timer" class="panel" aria-label="Focus timer">
        <div class="panel-header">
          <div>
            <div class="panel-title">Focus Timer</div>
            <div class="panel-subtitle">Simple timer to support focused sessions.</div>
          </div>
          <div class="row">
            <button class="pill-btn" id="timer-reset">Reset</button>
          </div>
        </div>

        <div id="timer-card" class="card">
          <div id="timer-main">
            <div id="timer-label">Session length</div>
            <div id="timer-clock">25:00</div>
            <div id="timer-controls">
              <button class="pill-btn" id="timer-start">Start</button>
              <button class="pill-btn" id="timer-pause">Pause</button>
            </div>
            <div id="timer-presets">
              <button class="pill-btn" data-minutes="25">25m</button>
              <button class="pill-btn" data-minutes="50">50m</button>
              <button class="pill-btn" data-minutes="90">90m</button>
            </div>
          </div>
          <div id="timer-notes">
            <h3>Session notes</h3>
            <textarea id="timer-note" placeholder="Capture what you learned in this session..."></textarea>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const qs = (sel, root = document) => root.querySelector(sel);
    const qsa = (sel, root = document) => Array.from(root.querySelectorAll(sel));

    const STORAGE_KEYS = {
      files: 'fc_files',
      notes: 'fc_notes',
      timer: 'fc_timer',
    };

    const state = {
      tool: 'bookshelf',
      files: [],
      currentFileId: null,
      notes: [],
      currentNoteId: null,
      timer: {
        duration: 25 * 60,
        remaining: 25 * 60,
        running: false,
        intervalId: null,
      },
    };

    const safeParse = (value, fallback) => {
      try { return JSON.parse(value); } catch { return fallback; }
    };

    const formatTime = seconds => {
      const m = String(Math.floor(seconds / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      return `${m}:${s}`;
    };

    function loadStorage() {
      state.files = safeParse(localStorage.getItem(STORAGE_KEYS.files), []);
      state.notes = safeParse(localStorage.getItem(STORAGE_KEYS.notes), []);
      const timerState = safeParse(localStorage.getItem(STORAGE_KEYS.timer), null);
      if (timerState) {
        state.timer.duration = timerState.duration || state.timer.duration;
        state.timer.remaining = typeof timerState.remaining === 'number' ? timerState.remaining : state.timer.remaining;
      }
    }

    function saveStorage() {
      localStorage.setItem(STORAGE_KEYS.files, JSON.stringify(state.files));
      localStorage.setItem(STORAGE_KEYS.notes, JSON.stringify(state.notes));
      localStorage.setItem(STORAGE_KEYS.timer, JSON.stringify({ duration: state.timer.duration, remaining: state.timer.remaining }));
    }

    function setTool(tool) {
      state.tool = tool;
      qsa('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.tool === tool));
      qsa('.panel').forEach(panel => panel.classList.toggle('active', panel.id === tool));
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function normalizeFileEntry(file) {
      return {
        id: crypto.randomUUID(),
        name: file.name,
        type: file.type || (file.name.endsWith('.pdf') ? 'application/pdf' : 'text/plain'),
        size: file.size,
        createdAt: Date.now(),
        lastOpened: Date.now(),
        progress: 0,
      };
    }

    function addFiles(files) {
      const entries = Array.from(files).map(f => normalizeFileEntry(f));
      state.files = [...entries, ...state.files];
      saveStorage();
      renderBookshelf();
    }

    function clearBookshelf() {
      if (!confirm('Clear all uploaded files?')) return;
      state.files = [];
      state.currentFileId = null;
      saveStorage();
      renderBookshelf();
      hideReader();
    }

    function renderBookshelf() {
      const container = qs('#bookshelf-grid');
      container.innerHTML = '';

      if (!state.files.length) {
        container.innerHTML = `<div style="padding:30px;text-align:center;opacity:.75;">No files yet. Use the upload button to add PDFs and text files.</div>`;
        return;
      }

      state.files.forEach(file => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'book';
        card.dataset.id = file.id;
        card.innerHTML = `
          <div class="book-title">${escapeHtml(file.name)}</div>
          <div class="book-meta"><span>${file.type.split('/')[1] || 'file'}</span><span>${new Date(file.createdAt).toLocaleDateString()}</span></div>
          <div class="book-progress"><span style="width:${Math.min(100, Math.round(file.progress * 100))}%"></span></div>
        `;
        card.addEventListener('click', () => openFile(file.id));
        container.appendChild(card);
      });
    }

    function openFile(fileId) {
      const fileEntry = state.files.find(f => f.id === fileId);
      if (!fileEntry) return;

      state.currentFileId = fileId;
      fileEntry.lastOpened = Date.now();
      saveStorage();
      renderBookshelf();
      showReader(fileEntry);
    }

    function showReader(fileEntry) {
      const reader = qs('#reader');
      reader.classList.add('active');
      qs('#reader-title').textContent = fileEntry.name;
      qs('#reader-search-input').value = '';
      qs('#reader-search-input').style.display = 'none';

      const frame = qs('#reader-frame');
      frame.innerHTML = '';

      const input = qs('#file-upload');
      const file = input.files && Array.from(input.files).find(f => f.name === fileEntry.name && f.size === fileEntry.size);

      if (!file) {
        frame.innerHTML = `<div style="padding:20px;color:var(--muted);">Please re-upload the file to view it. (Files are stored in session only.)</div>`;
        return;
      }

      const url = URL.createObjectURL(file);

      if (fileEntry.type === 'application/pdf') {
        const iframe = document.createElement('iframe');
        iframe.src = url;
        frame.appendChild(iframe);
      } else {
        const pre = document.createElement('pre');
        pre.id = 'reader-text';
        pre.textContent = 'Loading...';
        frame.appendChild(pre);
        file.text().then(text => {
          pre.textContent = text;
        }).catch(() => {
          pre.textContent = 'Unable to load file content.';
        });
      }
    }

    function hideReader() {
      const reader = qs('#reader');
      reader.classList.remove('active');
    }

    function filterReaderText(query) {
      const pre = qs('#reader-text');
      if (!pre) return;
      const text = pre.textContent;
      const escaped = query.replace(/[.*+?^${}()|[\\]\\]/g, '\\$&');
      const re = new RegExp(escaped, 'gi');
      pre.innerHTML = text.replace(re, match => `<mark>${match}</mark>`);
    }

    function renderNotesList() {
      const list = qs('#notes-list');
      list.innerHTML = '';
      if (!state.notes.length) {
        list.innerHTML = `<div style="padding:20px;opacity:.75;">No notes yet. Click "New note" to start writing.</div>`;
        return;
      }

      state.notes.forEach(note => {
        const item = document.createElement('button');
        item.type = 'button';
        item.className = 'note-item' + (note.id === state.currentNoteId ? ' active' : '');
        item.dataset.id = note.id;
        item.innerHTML = `<div class="note-title">${escapeHtml(note.title || 'Untitled')}</div><div class="note-meta">${new Date(note.updatedAt).toLocaleString()}</div>`;
        item.addEventListener('click', () => selectNote(note.id));
        list.appendChild(item);
      });
    }

    function selectNote(noteId) {
      state.currentNoteId = noteId;
      const note = state.notes.find(n => n.id === noteId);
      if (!note) return;
      qs('#note-title').value = note.title;
      qs('#note-body').value = note.body;
      renderNotesList();
    }

    function createNote() {
      const newNote = { id: crypto.randomUUID(), title: '', body: '', createdAt: Date.now(), updatedAt: Date.now() };
      state.notes.unshift(newNote);
      saveStorage();
      selectNote(newNote.id);
      renderNotesList();
    }

    function deleteNote() {
      if (!state.currentNoteId) return;
      if (!confirm('Delete this note?')) return;
      state.notes = state.notes.filter(n => n.id !== state.currentNoteId);
      state.currentNoteId = state.notes[0]?.id || null;
      saveStorage();
      renderNotesList();
      if (state.currentNoteId) selectNote(state.currentNoteId);
      else {
        qs('#note-title').value = '';
        qs('#note-body').value = '';
      }
    }

    function saveCurrentNote() {
      const note = state.notes.find(n => n.id === state.currentNoteId);
      if (!note) return;
      note.title = qs('#note-title').value;
      note.body = qs('#note-body').value;
      note.updatedAt = Date.now();
      saveStorage();
      renderNotesList();
    }

    function renderTimer() {
      qs('#timer-clock').textContent = formatTime(state.timer.remaining);
      qsa('#timer-presets button').forEach(btn => btn.classList.toggle('active', Number(btn.dataset.minutes) * 60 === state.timer.duration));
    }

    function startTimer() {
      if (state.timer.running) return;
      state.timer.running = true;
      state.timer.intervalId = setInterval(() => {
        if (state.timer.remaining <= 0) {
          clearInterval(state.timer.intervalId);
          state.timer.running = false;
          state.timer.remaining = 0;
          saveStorage();
          renderTimer();
          alert('Session complete — take a short break!');
          return;
        }
        state.timer.remaining -= 1;
        saveStorage();
        renderTimer();
      }, 1000);
    }

    function pauseTimer() {
      if (!state.timer.running) return;
      clearInterval(state.timer.intervalId);
      state.timer.running = false;
      saveStorage();
      renderTimer();
    }

    function resetTimer() {
      pauseTimer();
      state.timer.remaining = state.timer.duration;
      saveStorage();
      renderTimer();
    }

    function setTimerDuration(minutes) {
      state.timer.duration = minutes * 60;
      state.timer.remaining = state.timer.duration;
      saveStorage();
      renderTimer();
    }

    function bindEvents() {
      qsa('.tab').forEach(btn => btn.addEventListener('click', () => setTool(btn.dataset.tool)));

      const upload = qs('#file-upload');
      upload.addEventListener('change', e => {
        if (e.target.files.length) addFiles(e.target.files);
        upload.value = '';
      });

      qs('#clear-books-btn').addEventListener('click', clearBookshelf);
      qs('#reader-close').addEventListener('click', hideReader);
      qs('#reader-search').addEventListener('click', () => {
        const input = qs('#reader-search-input');
        input.style.display = input.style.display === 'none' ? 'inline-flex' : 'none';
        if (input.style.display !== 'none') input.focus();
      });
      qs('#reader-search-input').addEventListener('input', e => {
        const query = e.target.value.trim();
        if (!query) return;
        filterReaderText(query);
      });

      qs('#new-note').addEventListener('click', createNote);
      qs('#delete-note').addEventListener('click', deleteNote);
      qs('#note-title').addEventListener('input', saveCurrentNote);
      qs('#note-body').addEventListener('input', saveCurrentNote);

      qs('#timer-start').addEventListener('click', startTimer);
      qs('#timer-pause').addEventListener('click', pauseTimer);
      qs('#timer-reset').addEventListener('click', resetTimer);
      qsa('#timer-presets button').forEach(btn => btn.addEventListener('click', () => setTimerDuration(Number(btn.dataset.minutes))));

      window.addEventListener('beforeunload', () => {
        pauseTimer();
        saveStorage();
      });
    }

    function init() {
      loadStorage();
      renderBookshelf();
      renderNotesList();
      if (state.notes.length) selectNote(state.notes[0].id);
      renderTimer();
      bindEvents();
    }

    init();
  </script>
</body>
</html>
