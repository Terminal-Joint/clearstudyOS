<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>macOS StudyOS</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --apple-blue: #007AFF;
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(255, 255, 255, 0.3);
        }

        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            overflow: hidden;
            background: url('https://help.apple.com/assets/6656209581E0F57C6C0A1950/6656209881E0F57C6C0A195F/en_US/62f689c836d07466547190f890989f66.png') no-repeat center center fixed;
            background-size: cover;
        }

        /* Top Bar */
        .menu-bar {
            height: 30px; width: 100%; background: rgba(0,0,0,0.2);
            backdrop-filter: blur(25px); color: white; display: flex;
            align-items: center; padding: 0 20px; font-size: 14px; position: fixed; top: 0; z-index: 9999;
        }

        /* Desktop Icons */
        .desktop-icons {
            position: absolute; top: 50px; right: 20px; display: flex; flex-direction: column; gap: 20px; align-items: center;
        }
        .desktop-icon {
            width: 60px; text-align: center; color: white; font-size: 12px; cursor: pointer; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .desktop-icon img { width: 50px; height: 50px; border-radius: 12px; margin-bottom: 5px; }

        /* Window Styling */
        .window {
            position: absolute; background: var(--glass); backdrop-filter: blur(40px);
            border-radius: 12px; box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            border: 1px solid var(--border); display: none; flex-direction: column; 
            min-width: 400px; min-height: 300px; z-index: 100;
        }

        .title-bar {
            height: 40px; display: flex; align-items: center; padding: 0 15px; cursor: move;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .controls { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; border: 0.5px solid rgba(0,0,0,0.1); cursor: pointer; }
        .close { background: #FF5F56; } .min { background: #FFBD2E; } .max { background: #27C93F; }

        /* App Content */
        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #notes-editor {
            flex: 1; border: none; outline: none; padding: 20px; font-size: 18px; line-height: 1.5;
            background: transparent; resize: none; color: #1d1d1f;
        }

        /* The Dock */
        .dock {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.25); backdrop-filter: blur(30px);
            padding: 10px 15px; border-radius: 22px; display: flex; gap: 15px;
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .dock-item {
            width: 50px; height: 50px; cursor: pointer; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dock-item:hover { transform: scale(1.3) translateY(-10px); }

        iframe { width: 100%; height: 100%; border: none; background: white; }
    </style>
</head>
<body>

<div class="menu-bar">
    <span style="font-weight: 800;"></span>&nbsp;&nbsp; <b>Notes</b> &nbsp; File &nbsp; Edit &nbsp; View &nbsp; Window
    <span id="clock" style="margin-left: auto;"></span>
</div>

<div class="desktop-icons">
    <div class="desktop-icon" onclick="openApp('notes-win')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/30/macOS_Notes_icon.svg" alt="Notes">
        <div>JEE Notes</div>
    </div>
</div>

<div class="window" id="notes-win" style="top: 100px; left: 100px; width: 600px; height: 500px;">
    <div class="title-bar" onmousedown="dragWindow(this.parentElement)">
        <div class="controls"><div class="dot close" onclick="closeApp('notes-win')"></div><div class="dot min"></div><div class="dot max"></div></div>
        <span style="margin-left: 20px; font-size: 13px; font-weight: 600; color: #444;">Study Notes</span>
    </div>
    <div class="content">
        <textarea id="notes-editor" placeholder="Write your Physics/Maths formulas here..."></textarea>
    </div>
</div>

<div class="window" id="safari-win" style="top: 150px; left: 400px; width: 800px; height: 600px;">
    <div class="title-bar" onmousedown="dragWindow(this.parentElement)">
        <div class="controls"><div class="dot close" onclick="closeApp('safari-win')"></div><div class="dot min"></div><div class="dot max"></div></div>
        <input type="text" id="url-bar" value="https://en.wikipedia.org" style="margin-left: 20px; width: 70%; border-radius: 6px; border: 1px solid #ccc; padding: 2px 10px;">
    </div>
    <div class="content">
        <iframe id="browser-frame" src="https://en.wikipedia.org"></iframe>
    </div>
</div>

<div class="dock">
    <img class="dock-item" src="https://upload.wikimedia.org/wikipedia/commons/3/30/macOS_Notes_icon.svg" onclick="openApp('notes-win')">
    <img class="dock-item" src="https://upload.wikimedia.org/wikipedia/commons/5/52/Safari_browser_logo.svg" onclick="openApp('safari-win')">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAPzgwYDQQqR4y8aRcu8BmXfhYoLPXDuVM",
        authDomain: "forclearpcm.firebaseapp.com",
        projectId: "forclearpcm",
        storageBucket: "forclearpcm.firebasestorage.app",
        messagingSenderId: "313585574692",
        appId: "1:313585574692:web:d4e1262ce22c7cd0bb89b1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const editor = document.getElementById('notes-editor');

    // Load Notes
    window.addEventListener('DOMContentLoaded', async () => {
        const snap = await getDoc(doc(db, "study", "main_notes"));
        if (snap.exists()) editor.value = snap.data().text;
    });

    // Auto-Save every 2 seconds if changed
    let timeout = null;
    editor.addEventListener('input', () => {
        clearTimeout(timeout);
        timeout = setTimeout(async () => {
            await setDoc(doc(db, "study", "main_notes"), { text: editor.value });
            console.log("Cloud Synced");
        }, 2000);
    });
</script>

<script>
    function openApp(id) { 
        const win = document.getElementById(id);
        win.style.display = 'flex';
        win.style.zIndex = Math.floor(Date.now() / 1000);
    }
    function closeApp(id) { document.getElementById(id).style.display = 'none'; }

    function dragWindow(el) {
        let x = 0, y = 0, nx = 0, ny = 0;
        el.onmousedown = (e) => {
            if(e.target.tagName === 'INPUT') return;
            el.style.zIndex = Math.floor(Date.now() / 1000);
            nx = e.clientX; ny = e.clientY;
            document.onmousemove = (e) => {
                x = nx - e.clientX; y = ny - e.clientY;
                nx = e.clientX; ny = e.clientY;
                el.style.top = (el.offsetTop - y) + "px";
                el.style.left = (el.offsetLeft - x) + "px";
            };
            document.onmouseup = () => { document.onmousemove = null; };
        };
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);
</script>

</body>
</html>
