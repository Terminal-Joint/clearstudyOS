<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mac Studio - Study Edition</title>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        :root {
            --mac-glass: rgba(255, 255, 255, 0.2);
            --win-bg: rgba(255, 255, 255, 0.8);
            --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: var(--font-main); }

        /* Real macOS Background */
        .desktop {
            background: url('https://images.wallpapersden.com/image/download/macos-sequoia-official-apple_bWlpZ2mUmZqaraWkpJRmbmdlrWZsZWU.jpg') no-repeat center center fixed;
            background-size: cover;
            width: 100vw; height: 100vh; position: relative;
        }

        /* Top Menu Bar */
        .menu-bar {
            height: 30px; width: 100%; background: rgba(0,0,0,0.2);
            backdrop-filter: blur(20px); color: white; display: flex;
            align-items: center; padding: 0 20px; font-size: 14px; box-sizing: border-box;
        }

        /* The Draggable Window */
        .window {
            position: absolute; width: 500px; height: 400px;
            background: var(--win-bg); backdrop-filter: blur(25px);
            border-radius: 12px; box-shadow: 0 50px 100px rgba(0,0,0,0.3);
            display: none; flex-direction: column; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.4); z-index: 10;
        }

        .title-bar {
            height: 40px; background: rgba(255,255,255,0.1);
            display: flex; align-items: center; padding: 0 15px; cursor: default;
        }

        .dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
        .close { background: #ff5f56; } .min { background: #ffbd2e; } .max { background: #27c93f; }

        .app-view { flex: 1; padding: 20px; overflow-y: auto; color: #333; }

        /* The Dock */
        .dock {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.25); backdrop-filter: blur(30px);
            padding: 10px 15px; border-radius: 24px; display: flex; gap: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .icon {
            width: 55px; height: 55px; border-radius: 14px; cursor: pointer;
            transition: transform 0.3s; background-size: cover;
        }
        .icon:hover { transform: scale(1.3) translateY(-10px); }

        /* Apps UI */
        textarea { width: 100%; height: 70%; border: none; background: transparent; outline: none; font-size: 16px; }
        #render-area { border-top: 1px solid #ccc; padding-top: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="desktop">
    <div class="menu-bar">
        <strong></strong> &nbsp;&nbsp; File &nbsp; Edit &nbsp; View &nbsp; Study &nbsp; Window
        <span id="clock" style="margin-left: auto;">10:00 AM</span>
    </div>

    <div class="window" id="notes-app" style="top:100px; left:100px;">
        <div class="title-bar" onmousedown="makeDraggable('notes-app')">
            <div class="dots"><div class="dot close" onclick="toggleApp('notes-app')"></div><div class="dot min"></div><div class="dot max"></div></div>
            <span style="margin-left: 20px; font-weight: 600;">LaTeX Notes</span>
        </div>
        <div class="app-view">
            <textarea id="note-input" placeholder="Type JEE Equations... e.g. $$x^2 + y^2 = r^2$$"></textarea>
            <button onclick="renderLatex()">Render & Sync</button>
            <div id="render-area"></div>
        </div>
    </div>

    <div class="window" id="search-app" style="top:150px; left:300px; width: 700px; height: 500px;">
        <div class="title-bar" onmousedown="makeDraggable('search-app')">
            <div class="dots"><div class="dot close" onclick="toggleApp('search-app')"></div><div class="dot min"></div><div class="dot max"></div></div>
            <span style="margin-left: 20px; font-weight: 600;">Study Browser</span>
        </div>
        <div class="app-view" style="padding:0;">
            <div style="padding: 10px; background: #eee;">
                <input type="text" id="url" placeholder="Search JEE topics..." style="width: 80%;">
                <button onclick="searchStudy()">Search</button>
            </div>
            <iframe id="browser" src="https://m.wikipedia.org" style="width:100%; height:85%; border:none;"></iframe>
        </div>
    </div>

    <div class="dock">
        <div class="icon" title="Notes" style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/3/30/macOS_Notes_icon.svg');" onclick="toggleApp('notes-app')"></div>
        <div class="icon" title="Browser" style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/5/52/Safari_browser_logo.svg');" onclick="toggleApp('search-app')"></div>
        <div class="icon" title="Upload" style="background-image: url('https://cdn-icons-png.flaticon.com/512/338/338914.png');" onclick="alert('Upload your PDF to Firebase Storage via Console')"></div>
    </div>
</div>

<script>
    // WINDOW TOGGLE
    function toggleApp(id) {
        let win = document.getElementById(id);
        win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
    }

    // DRAG LOGIC (The "OS" Feel)
    function makeDraggable(id) {
        let el = document.getElementById(id);
        el.onmousedown = function(e) {
            let offsetX = e.clientX - el.offsetLeft;
            let offsetY = e.clientY - el.offsetTop;
            document.onmousemove = function(e) {
                el.style.left = (e.clientX - offsetX) + 'px';
                el.style.top = (e.clientY - offsetY) + 'px';
            };
            document.onmouseup = function() {
                document.onmousemove = null;
            };
        };
    }

    // LATEX RENDER
    function renderLatex() {
        let input = document.getElementById('note-input').value;
        document.getElementById('render-area').innerHTML = input;
        MathJax.typeset();
        localStorage.setItem('saved_note', input); // Basic local save
    }

    // BROWSER LOGIC
    function searchStudy() {
        let q = document.getElementById('url').value;
        document.getElementById('browser').src = "https://m.wikipedia.org/wiki/" + q;
    }

    // CLOCK
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);

    // Initial Load
    window.onload = () => {
        let saved = localStorage.getItem('saved_note');
        if(saved) {
            document.getElementById('note-input').value = saved;
            renderLatex();
        }
    };
</script>

</body>
</html>
