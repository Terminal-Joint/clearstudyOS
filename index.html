<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>macOS Sequoia - Pro Study OS</title>
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        :root { --mac-glass: rgba(255, 255, 255, 0.25); --blur: blur(35px); --accent: #007AFF; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body, html { margin: 0; height: 100vh; width: 100vw; overflow: hidden; 
            background: url('https://help.apple.com/assets/6656209581E0F57C6C0A1950/6656209881E0F57C6C0A195F/en_US/62f689c836d07466547190f890989f66.png') center/cover; }

        /* Menu Bar */
        .menu-bar { height: 30px; width: 100%; background: rgba(0,0,0,0.15); backdrop-filter: var(--blur);
            display: flex; align-items: center; padding: 0 20px; color: white; font-size: 13px; z-index: 10000; position: fixed; }

        /* Desktop Shortcuts */
        #desktop { position: absolute; inset: 30px 0 0 0; padding: 20px; display: grid; 
            grid-template-columns: repeat(auto-fill, 90px); grid-template-rows: repeat(auto-fill, 100px); 
            grid-auto-flow: column; gap: 20px; }
        .shortcut { width: 80px; text-align: center; color: white; cursor: pointer; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .shortcut img, .shortcut .note-icon { width: 60px; height: 60px; border-radius: 14px; margin-bottom: 5px; display: block; margin: 0 auto; }
        .shortcut .note-icon { background: white; color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }

        /* Windows */
        .window { position: absolute; background: rgba(245,245,245,0.9); backdrop-filter: var(--blur);
            border-radius: 12px; box-shadow: 0 30px 60px rgba(0,0,0,0.4); display: none; flex-direction: column; overflow: hidden; border: 1px solid rgba(255,255,255,0.3); }
        .window.active { z-index: 5000; box-shadow: 0 40px 80px rgba(0,0,0,0.6); }
        .title-bar { height: 45px; display: flex; align-items: center; padding: 0 15px; cursor: move; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; cursor: pointer; }

        /* Safari Fix */
        .safari-ui { display: flex; flex-direction: column; height: 100%; }
        .address-bar { padding: 8px; background: #e0e0e0; display: flex; gap: 10px; }
        .address-bar input { flex: 1; border-radius: 6px; border: 1px solid #ccc; padding: 4px 12px; outline: none; }

        /* Dock */
        .dock { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.2); backdrop-filter: var(--blur);
            padding: 8px 12px; border-radius: 20px; display: flex; gap: 12px; z-index: 9000; border: 1px solid rgba(255,255,255,0.2); }
        .dock img { width: 50px; height: 50px; cursor: pointer; transition: 0.2s; }
        .dock img:hover { transform: scale(1.3) translateY(-10px); }
    </style>
</head>
<body oncontextmenu="showContextMenu(event)">

<div class="menu-bar">
    <span style="font-weight: 800; margin-right: 20px;"></span>
    <b id="active-app">Finder</b>
    <span id="clock" style="margin-left: auto;"></span>
</div>

<div id="desktop">
    </div>

<div class="window" id="notes-app" style="width: 700px; height: 500px; top: 100px; left: 100px;">
    <div class="title-bar" onmousedown="focusWin('notes-app'); dragWin(this.parentElement)">
        <div class="dot" style="background:#FF5F56" onclick="closeWin('notes-app')"></div>
        <div class="dot" style="background:#FFBD2E"></div>
        <div class="dot" style="background:#27C93F"></div>
        <input type="text" id="note-filename" placeholder="Note Name..." style="background:transparent; border:none; margin-left:20px; font-weight:bold; outline:none;">
    </div>
    <div id="editor" style="height: 100%; background: white;"></div>
</div>

<div class="window" id="safari-app" style="width: 900px; height: 600px; top: 150px; left: 200px;">
    <div class="title-bar" onmousedown="focusWin('safari-app'); dragWin(this.parentElement)">
        <div class="dot" style="background:#FF5F56" onclick="closeWin('safari-app')"></div>
        <div class="win-title" style="margin-left:auto; margin-right:auto; font-size:12px;">Safari</div>
    </div>
    <div class="safari-ui">
        <div class="address-bar">
            <input type="text" id="url-input" placeholder="Search or type URL (use DuckDuckGo for best results)..." onkeydown="navBrowser(event)">
        </div>
        <iframe id="browser-frame" src="https://duckduckgo.com" style="flex:1; border:none; background:white;"></iframe>
    </div>
</div>

<div class="dock">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/30/macOS_Notes_icon.svg" onclick="openWin('notes-app')">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/52/Safari_browser_logo.svg" onclick="openWin('safari-app')">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAPzgwYDQQqR4y8aRcu8BmXfhYoLPXDuVM",
        authDomain: "forclearpcm.firebaseapp.com",
        projectId: "forclearpcm",
        storageBucket: "forclearpcm.firebasestorage.app",
        messagingSenderId: "313585574692",
        appId: "1:313585574692:web:d4e1262ce22c7cd0bb89b1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Initialize Quill
    const quill = new Quill('#editor', { theme: 'snow' });
    let currentFile = "default_note";

    // Auto-Save Note
    const saveNote = async () => {
        const name = document.getElementById('note-filename').value || "Untitled";
        await setDoc(doc(db, "user_notes", currentFile), { name, content: quill.root.innerHTML });
    };
    quill.on('text-change', saveNote);
    document.getElementById('note-filename').oninput = saveNote;

    // Load Shortcuts & Desktop Icons
    onSnapshot(collection(db, "user_notes"), (snap) => {
        const desktop = document.getElementById('desktop');
        desktop.innerHTML = '';
        snap.forEach(d => {
            const data = d.data();
            desktop.innerHTML += `<div class="shortcut" onclick="openNote('${d.id}')">
                <div class="note-icon">N</div>
                <div style="font-size:12px">${data.name}</div>
            </div>`;
        });
    });

    window.openNote = async (id) => {
        currentFile = id;
        openWin('notes-app');
        // Logic to fetch and set Quill content goes here
    };
</script>

<script>
    function openWin(id) { document.getElementById(id).style.display = 'flex'; focusWin(id); }
    function closeWin(id) { document.getElementById(id).style.display = 'none'; }
    function focusWin(id) {
        document.querySelectorAll('.window').forEach(w => w.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('active-app').innerText = id.split('-')[0].toUpperCase();
    }

    function navBrowser(e) {
        if(e.key === 'Enter') {
            let url = e.target.value;
            if(!url.includes('.')) url = "https://duckduckgo.com/?q=" + url;
            else if(!url.startsWith('http')) url = "https://" + url;
            document.getElementById('browser-frame').src = url;
        }
    }

    function dragWin(el) {
        let nx = 0, ny = 0;
        el.onmousedown = (e) => {
            if(e.target.tagName === 'INPUT') return;
            nx = e.clientX; ny = e.clientY;
            document.onmousemove = (e) => {
                el.style.top = (el.offsetTop - (ny - e.clientY)) + "px";
                el.style.left = (el.offsetLeft - (nx - e.clientX)) + "px";
                nx = e.clientX; ny = e.clientY;
            };
            document.onmouseup = () => document.onmousemove = null;
        };
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);

    function showContextMenu(e) {
        e.preventDefault();
        const action = confirm("Add new site shortcut to Desktop?");
        if(action) {
            const name = prompt("Site Name:");
            const url = prompt("URL:");
            // Here you would save this to a 'shortcuts' collection in Firebase
        }
    }
</script>
</body>
</html>
