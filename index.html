<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>macOS StudyOS - Pro Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --mac-radius: 12px;
            --glass: rgba(255, 255, 255, 0.75);
            --accent: #007AFF;
        }

        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow: hidden;
            background: url('https://help.apple.com/assets/6656209581E0F57C6C0A1950/6656209881E0F57C6C0A195F/en_US/62f689c836d07466547190f890989f66.png') center/cover;
        }

        /* Top Menu Bar */
        .system-bar {
            height: 30px; width: 100%; background: rgba(0,0,0,0.3);
            backdrop-filter: blur(30px); color: white; display: flex;
            align-items: center; padding: 0 20px; font-size: 13px; position: fixed; top: 0; z-index: 10000;
        }

        /* Launchpad (Start Menu) */
        #launchpad {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(50px); z-index: 9000; display: none;
            flex-direction: column; align-items: center; padding-top: 100px;
            color: white;
        }
        .lp-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; text-align: center; }
        .lp-item { cursor: pointer; transition: 0.3s; width: 100px; }
        .lp-item:hover { transform: scale(1.1); }
        .lp-item img { width: 80px; height: 80px; border-radius: 18px; margin-bottom: 10px; }

        /* Window System */
        .window {
            position: absolute; background: var(--glass); backdrop-filter: blur(50px);
            border-radius: var(--mac-radius); box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            display: none; flex-direction: column; border: 0.5px solid rgba(255,255,255,0.4);
        }
        .window.active { z-index: 5000; box-shadow: 0 50px 100px rgba(0,0,0,0.5); }
        .title-bar { height: 40px; display: flex; align-items: center; padding: 0 15px; cursor: default; }
        .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }

        /* Notes App Interface */
        .notes-app-body { display: flex; height: 100%; background: white; border-radius: 0 0 12px 12px; }
        .notes-list { width: 220px; background: #f5f5f5; border-right: 1px solid #ddd; padding: 15px; overflow-y: auto; }
        .note-entry { padding: 10px; border-radius: 8px; margin-bottom: 5px; cursor: pointer; font-size: 13px; }
        .note-entry:hover { background: #e0e0e0; }
        .note-entry.selected { background: var(--accent); color: white; }
        .editor-area { flex: 1; display: flex; flex-direction: column; }
        #note-title-input { border: none; padding: 20px; font-size: 24px; font-weight: 700; outline: none; }
        #note-body-input { flex: 1; border: none; padding: 0 20px 20px; font-size: 16px; outline: none; resize: none; }

        /* Dock */
        .dock {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.3); backdrop-filter: blur(30px);
            padding: 8px 12px; border-radius: 22px; display: flex; gap: 15px; z-index: 8000;
        }
        .dock-app { width: 50px; height: 50px; cursor: pointer; transition: 0.2s; }
        .dock-app:hover { transform: scale(1.3) translateY(-10px); }
    </style>
</head>
<body>

<div class="system-bar">
    <span onclick="toggleLaunchpad()" style="cursor:pointer"></span>&nbsp;&nbsp; 
    <b id="active-app-name">Finder</b>
    <span id="clock" style="margin-left: auto;"></span>
</div>

<div id="launchpad" onclick="toggleLaunchpad()">
    <div class="lp-grid" onclick="event.stopPropagation()">
        <div class="lp-item" onclick="openApp('notes-win'); toggleLaunchpad()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/30/macOS_Notes_icon.svg">
            <div>Notes</div>
        </div>
        <div class="lp-item" onclick="openApp('safari-win'); toggleLaunchpad()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/52/Safari_browser_logo.svg">
            <div>Safari</div>
        </div>
    </div>
    <div style="margin-top: 50px; width: 80%; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px;">
        <h3>Recent Study Notes</h3>
        <div id="lp-notes-list" class="lp-grid" style="grid-template-columns: repeat(6, 1fr);"></div>
    </div>
</div>

<div id="desktop">
    <div class="window" id="notes-win" style="width: 900px; height: 600px; top: 80px; left: 100px;">
        <div class="title-bar" onmousedown="focusWin('notes-win'); dragWin(this.parentElement)">
            <div class="dot" style="background:#FF5F56" onclick="closeApp('notes-win')"></div>
            <div class="dot" style="background:#FFBD2E"></div>
            <div class="dot" style="background:#27C93F"></div>
            <button onclick="createNewNote()" style="margin-left:auto; background:var(--accent); color:white; border:none; border-radius:5px; padding:2px 10px;">+ New Note</button>
        </div>
        <div class="notes-app-body">
            <div class="notes-list" id="sidebar-notes"></div>
            <div class="editor-area">
                <input type="text" id="note-title-input" placeholder="Untitled Note">
                <textarea id="note-body-input" placeholder="Start writing..."></textarea>
            </div>
        </div>
    </div>
</div>

<div class="dock">
    <img class="dock-app" src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" onclick="toggleLaunchpad()" title="Launchpad">
    <img class="dock-app" src="https://upload.wikimedia.org/wikipedia/commons/3/30/macOS_Notes_icon.svg" onclick="openApp('notes-win')">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAPzgwYDQQqR4y8aRcu8BmXfhYoLPXDuVM",
        authDomain: "forclearpcm.firebaseapp.com",
        projectId: "forclearpcm",
        storageBucket: "forclearpcm.firebasestorage.app",
        messagingSenderId: "313585574692",
        appId: "1:313585574692:web:d4e1262ce22c7cd0bb89b1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let currentNoteId = null;

    // REAL-TIME SYNC
    onSnapshot(collection(db, "study_notes"), (snapshot) => {
        const sidebar = document.getElementById('sidebar-notes');
        const lpNotes = document.getElementById('lp-notes-list');
        sidebar.innerHTML = '';
        lpNotes.innerHTML = '';

        snapshot.forEach((doc) => {
            const data = doc.data();
            const div = document.createElement('div');
            div.className = `note-entry ${doc.id === currentNoteId ? 'selected' : ''}`;
            div.innerText = data.title || "Untitled";
            div.onclick = () => loadNote(doc.id, data);
            sidebar.appendChild(div);

            // Add to Start Menu (Launchpad)
            const lpItem = document.createElement('div');
            lpItem.className = 'lp-item';
            lpItem.innerHTML = `<div style="background:#fff; color:#333; padding:20px; border-radius:10px;">DOC</div><div style="font-size:12px">${data.title}</div>`;
            lpItem.onclick = () => { loadNote(doc.id, data); openApp('notes-win'); };
            lpNotes.appendChild(lpItem);
        });
    });

    window.loadNote = (id, data) => {
        currentNoteId = id;
        document.getElementById('note-title-input').value = data.title;
        document.getElementById('note-body-input').value = data.body;
        document.querySelectorAll('.note-entry').forEach(el => el.classList.remove('selected'));
    };

    window.createNewNote = () => {
        const id = "note_" + Date.now();
        currentNoteId = id;
        saveCurrentNote();
    };

    async function saveCurrentNote() {
        if (!currentNoteId) return;
        const title = document.getElementById('note-title-input').value;
        const body = document.getElementById('note-body-input').value;
        await setDoc(doc(db, "study_notes", currentNoteId), { title, body, updated: Date.now() });
    }

    // Auto-save on typing
    document.getElementById('note-title-input').addEventListener('input', saveCurrentNote);
    document.getElementById('note-body-input').addEventListener('input', saveCurrentNote);
</script>

<script>
    function toggleLaunchpad() {
        const lp = document.getElementById('launchpad');
        lp.style.display = lp.style.display === 'flex' ? 'none' : 'flex';
    }

    function openApp(id) { 
        document.getElementById(id).style.display = 'flex'; 
        focusWin(id);
    }
    
    function closeApp(id) { document.getElementById(id).style.display = 'none'; }

    function focusWin(id) {
        document.querySelectorAll('.window').forEach(w => w.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('active-app-name').innerText = id.split('-')[0].toUpperCase();
    }

    function dragWin(el) {
        let nx = 0, ny = 0;
        el.onmousedown = (e) => {
            if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'BUTTON') return;
            nx = e.clientX; ny = e.clientY;
            document.onmousemove = (e) => {
                el.style.top = (el.offsetTop - (ny - e.clientY)) + "px";
                el.style.left = (el.offsetLeft - (nx - e.clientX)) + "px";
                nx = e.clientX; ny = e.clientY;
            };
            document.onmouseup = () => { document.onmousemove = null; };
        };
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);
</script>
</body>
</html>
