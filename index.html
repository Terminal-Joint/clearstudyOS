<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%93%98%3C/text%3E%3C/svg%3E" />
  <title>For Clear Studies</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.min.js"></script>
  <script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.worker.min.js";
</script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    :root {
      --taskbar-h: 58px;
      --radius-win: 10px;
      --glass: rgba(16, 22, 40, 0.56);
      --line: rgba(255,255,255,.18);
      --text: #f5f7ff;
      --accent: #4f8cff;
      --wallpaper: url('https://images.unsplash.com/photo-1604079628040-94301bb21b91?q=80&w=1974&auto=format&fit=crop');
      --window-bg: rgba(23, 30, 54, 0.72);
      --font-size-ui: 13px;
      --font-family-ui: "Segoe UI", "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: var(--font-family-ui);
      font-size: var(--font-size-ui);
      color: var(--text);
    }
    body {
      background:
        radial-gradient(120% 100% at 20% 10%, rgba(102,132,255,.30), transparent 48%),
        radial-gradient(120% 100% at 90% 10%, rgba(177,114,255,.22), transparent 42%),
        var(--wallpaper) center/cover no-repeat;
    }
    .glass {
      background: var(--glass);
      backdrop-filter: blur(16px) saturate(145%);
      -webkit-backdrop-filter: blur(16px) saturate(145%);
      border: 1px solid var(--line);
      box-shadow: 0 14px 34px rgba(0,0,0,.34);
    }
    .btn, .field, select {
      font: inherit;
      color: var(--text);
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.10);
      padding: 7px 10px;
    }
    .btn { cursor: pointer; }
    .btn:hover { background: rgba(255,255,255,.17); }
    .btn.primary { background: var(--accent); border-color: transparent; }

    #desktop {
      position: absolute;
      inset: 10px 10px calc(var(--taskbar-h) + 10px) 10px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      grid-auto-rows: 110px;
      gap: 10px;
      align-content: start;
      overflow: auto;
      user-select: none;
    }
    .desktop-icon {
      width: 92px;
      justify-self: center;
      text-align: center;
      border-radius: 10px;
      padding: 6px;
      cursor: pointer;
      position: relative;
    }
    .desktop-icon:hover { background: rgba(255,255,255,.15); }
    .tile {
      width: 54px;
      height: 54px;
      margin: 0 auto;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.35);
      background: rgba(255,255,255,.16);
      display: grid;
      place-items: center;
      font-size: 26px;
    }
    .label {
      margin-top: 6px;
      font-size: 12px;
      text-shadow: 0 2px 6px rgba(0,0,0,.6);
      word-break: break-word;
    }
    .icon-edit {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 18px;
      height: 18px;
      border-radius: 6px;
      display: none;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.35);
      font-size: 11px;
      line-height: 16px;
      text-align: center;
    }
    .desktop-icon:hover .icon-edit { display: inline-block; }

    #taskbar {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 8px;
      height: var(--taskbar-h);
      border-radius: 12px;
      z-index: 9000;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
    }
    #tb-left, #tb-center, #tb-right { display: flex; align-items: center; gap: 8px; }
    #tb-center { justify-content: center; }
    #tb-right { justify-content: flex-end; }
    .tb-btn {
      position: relative;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      border-radius: 8px;
      height: 38px;
      min-width: 38px;
      padding: 0 9px;
      cursor: pointer;
      font-size: 16px;
    }
    .tb-btn:hover { background: rgba(255,255,255,.16); border-color: rgba(255,255,255,.2); }
    .tb-btn.active::after {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 2px;
      width: 20px;
      height: 3px;
      border-radius: 999px;
      background: #fff;
    }
    .pill {
      border: 1px solid var(--line);
      border-radius: 9px;
      background: rgba(255,255,255,.12);
      padding: 6px 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    #start-menu, #quick-note-pop {
      position: fixed;
      bottom: 74px;
      border-radius: 12px;
      z-index: 9400;
      display: none;
      opacity: 0;
      transition: transform .22s ease, opacity .2s ease;
    }
    #start-menu.open, #quick-note-pop.open { opacity: 1; }

    #start-menu {
      left: 50%;
      transform: translateX(-50%) translateY(16px) scale(.98);
      width: min(900px, 96vw);
      padding: 12px;
    }
    #start-menu.open { transform: translateX(-50%) translateY(0) scale(1); }
    #start-search { width: 100%; }
    #space-row { display: flex; gap: 8px; align-items: center; margin: 10px 0; flex-wrap: wrap; }
    .space-chip {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.10);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
    }
    .space-chip.active { background: var(--accent); border-color: transparent; }
    #start-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0,1fr));
      gap: 8px;
    }
    .start-item {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.08);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      min-height: 70px;
    }
    #recommended {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: rgba(255,255,255,.06);
    }
    #recommended-list { display: grid; gap: 7px; margin-top: 8px; }
    .rec-item { border: 1px solid var(--line); border-radius: 8px; padding: 7px 8px; cursor: pointer; background: rgba(255,255,255,.06); }

    #quick-note-pop {
      right: 12px;
      width: min(360px, 92vw);
      transform: translateY(16px);
      padding: 10px;
    }
    #quick-note-pop.open { transform: translateY(0); }
    #quick-note-text { width: 100%; min-height: 120px; resize: vertical; }

    .window {
      position: absolute;
      display: none;
      flex-direction: column;
      min-width: 330px;
      min-height: 240px;
      width: min(980px, 94vw);
      height: min(720px, 86vh);
      left: 80px;
      top: 64px;
      border-radius: var(--radius-win);
      overflow: hidden;
      z-index: 500;
      background: var(--window-bg);
      border: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }
    .window.active { z-index: 1300; }
    .titlebar {
      height: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 8px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      cursor: move;
      user-select: none;
    }
    .title {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: auto;
    }
    .w-controls { display: flex; gap: 4px; margin-left: auto; }
    .ctrl {
      width: 28px;
      height: 24px;
      border-radius: 6px;
      border: 1px solid transparent;
      background: transparent;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      display: grid;
      place-items: center;
    }
    .ctrl:hover { background: rgba(255,255,255,.18); border-color: rgba(255,255,255,.2); }
    .ctrl.close:hover { background: #c42b1c; border-color: #c42b1c; }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      padding: 6px 8px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.05);
    }
    .app-body { flex: 1; min-height: 0; overflow: auto; padding: 8px; }
    .panel { border: 1px solid var(--line); border-radius: 9px; background: rgba(255,255,255,.06); }
    .split { display: grid; grid-template-columns: 270px 1fr; gap: 8px; height: 100%; }

    .resize-handle { position: absolute; z-index: 1400; }
    .resize-handle.e { top:8px; bottom:8px; right:-4px; width:8px; cursor:ew-resize; }
    .resize-handle.w { top:8px; bottom:8px; left:-4px; width:8px; cursor:ew-resize; }
    .resize-handle.n { left:8px; right:8px; top:-4px; height:8px; cursor:ns-resize; }
    .resize-handle.s { left:8px; right:8px; bottom:-4px; height:8px; cursor:ns-resize; }
    .resize-handle.ne { top:-4px; right:-4px; width:10px; height:10px; cursor:nesw-resize; }
    .resize-handle.nw { top:-4px; left:-4px; width:10px; height:10px; cursor:nwse-resize; }
    .resize-handle.se { bottom:-4px; right:-4px; width:10px; height:10px; cursor:nwse-resize; }
    .resize-handle.sw { bottom:-4px; left:-4px; width:10px; height:10px; cursor:nesw-resize; }

    .note-item, .task-row, .book-item, .vault-item, .sticky-item {
      padding: 8px;
      border-bottom: 1px solid rgba(255,255,255,.12);
      cursor: pointer;
    }
    .note-item.active { background: rgba(79,140,255,.32); }

    .cards { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; }
    .card { padding: 10px; border-radius: 10px; border: 1px solid var(--line); background: rgba(255,255,255,.08); }
    .card b { font-size: 22px; }

    /* Chrome-like browser */
    #browser-top { padding: 4px 6px 0; border-bottom: 1px solid var(--line); background: rgba(255,255,255,.04); }
    #browser-tabs {
      display: flex;
      align-items: end;
      gap: 4px;
      overflow: auto;
      padding-bottom: 4px;
    }
    .btab {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.08);
      color: var(--text);
      border-radius: 8px 8px 0 0;
      min-width: 150px;
      max-width: 240px;
      height: 30px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
      cursor: pointer;
    }
    .btab.active { background: rgba(79,140,255,.34); }
    .btab .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; flex: 1; }
    .btab .close-tab {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1px solid transparent;
      background: transparent;
      color: #fff;
      font-size: 11px;
      cursor: pointer;
    }
    .btab .close-tab:hover { background: rgba(255,255,255,.22); }
    #browser-frame { width:100%; height:100%; border:0; background:#fff; border-radius:8px; }

    /* Global annotation overlay */
    #annot-overlay {
      position: fixed;
      inset: 0;
      z-index: 12000;
      display: none;
      pointer-events: none;
    }
    #annot-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: auto;
      cursor: crosshair;
    }
    #annot-tools {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 12500;
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 10px;
      pointer-events: auto;
    }

    @media (max-width: 1100px) {
      .cards { grid-template-columns: repeat(2, minmax(0,1fr)); }
      #start-grid { grid-template-columns: repeat(4, minmax(0,1fr)); }
      .split { grid-template-columns: 1fr; }
      .pill { display: none; }
    }
    @media (max-width: 700px) {
      #start-grid { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .tb-btn { min-width: 34px; height: 34px; }
      #taskbar { height: 52px; }
      .window { width: calc(100vw - 16px); height: calc(100vh - 72px); left: 8px; top: 8px; }
    }
  </style>
</head>
<body>
  <main id="desktop"></main>

  <aside id="start-menu" class="glass">
    <input id="start-search" class="field" placeholder="Search apps and note content..." />
    <div id="space-row">
      <div id="spaces" style="display:flex;gap:8px;flex-wrap:wrap;flex:1"></div>
      <button class="btn" id="add-space">+ Space</button>
      <button class="btn" id="rename-space">Rename</button>
      <button class="btn" id="delete-space">Delete</button>
    </div>
    <div id="start-grid"></div>
    <div id="recommended">
      <b>Recommended</b>
      <div id="recommended-list"></div>
    </div>
  </aside>

  <aside id="quick-note-pop" class="glass">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;"><b style="margin-right:auto;">Quick Note</b><button class="btn" id="quick-note-save">Save</button></div>
    <textarea id="quick-note-text" class="field" placeholder="Write and save instantly..."></textarea>
  </aside>

  <section id="dashboard-window" class="window">
    <div class="titlebar" data-window="dashboard-window"><div class="title">Dashboard</div><div class="w-controls"><button class="ctrl min" data-close="dashboard-window">—</button><button class="ctrl max" data-max="dashboard-window">▢</button><button class="ctrl close" data-close="dashboard-window">✕</button></div></div>
    <div class="app-body">
      <div class="cards">
        <div class="card"><div>Today Minutes</div><b id="m-today">0m</b></div>
        <div class="card"><div>Streak</div><b id="m-streak">0d</b></div>
        <div class="card"><div>Tasks Done</div><b id="m-tasks">0</b></div>
        <div class="card"><div>Vault Items</div><b id="m-vault">0</b></div>
      </div>
      <div class="panel" style="margin-top:10px;padding:10px;">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <label>Daily goal <input class="field" id="daily-goal" type="number" min="30" max="600" style="width:110px"></label>
          <button class="btn primary" id="save-goal">Save Goal</button>
          <button class="btn" id="sync-now">Sync Now</button>
          <button class="btn" id="open-desktop-from-dashboard">Show Desktop</button>
        </div>
        <div id="coach-text" style="margin-top:8px;opacity:.9;"></div>
        <div id="study-activity" style="margin-top:8px;display:grid;gap:5px;font-size:12px;"></div>
      </div>
    </div>
    <div class="app-body panel" id="dashboard-task-list"></div>
  </section>

  <section id="notes-window" class="window" style="left:100px;top:70px;">
    <div class="titlebar" data-window="notes-window"><div class="title">Notes</div><div class="w-controls"><button class="ctrl min" data-close="notes-window">—</button><button class="ctrl max" data-max="notes-window">▢</button><button class="ctrl close" data-close="notes-window">✕</button></div></div>
    <div class="toolbar"><button class="btn" id="note-new">New</button><button class="btn" id="note-delete">Delete</button><button class="btn primary" id="note-save">Save</button><button class="btn" id="note-highlight">Highlight Selection</button><button class="btn" id="pin-to-vault">Pin to Vault</button></div>
    <div class="app-body split">
      <aside class="panel" style="display:grid;grid-template-rows:1fr 220px;min-height:0;">
        <div id="notes-list" style="overflow:auto;"></div>
        <div id="notes-highlights" style="overflow:auto;border-top:1px solid rgba(255,255,255,.14);"></div>
      </aside>
      <section class="panel" style="display:flex;flex-direction:column;gap:8px;padding:8px;">
        <input id="note-title" class="field" placeholder="Title">
        <textarea id="note-content" class="field" style="min-height:320px;resize:vertical;" placeholder="Your study notes..."></textarea>
      </section>
    </div>
  </section>

  <section id="planner-window" class="window" style="left:130px;top:84px;width:min(760px,94vw);height:min(620px,82vh);">
    <div class="titlebar" data-window="planner-window"><div class="title">Planner</div><div class="w-controls"><button class="ctrl min" data-close="planner-window">—</button><button class="ctrl max" data-max="planner-window">▢</button><button class="ctrl close" data-close="planner-window">✕</button></div></div>
    <div class="toolbar"><input id="task-title" class="field" placeholder="Task" style="flex:1;"><input id="task-subject" class="field" placeholder="Subject" style="width:140px;"><input id="task-due" class="field" type="date"><button class="btn primary" id="task-add">Add</button></div>
    <div class="app-body panel" id="task-list"></div>
  </section>

  <section id="browser-window" class="window" style="left:140px;top:62px;width:min(1150px,96vw);height:min(760px,88vh);">
    <div class="titlebar" data-window="browser-window"><div class="title">Study Browser</div><div class="w-controls"><button class="ctrl min" data-close="browser-window">—</button><button class="ctrl max" data-max="browser-window">▢</button><button class="ctrl close" data-close="browser-window">✕</button></div></div>
    <div id="browser-top">
      <div id="browser-tabs"></div>
    </div>
    <div class="toolbar"><button class="btn" id="browser-new-tab">+ Tab</button><input id="browser-url" class="field" style="flex:1;" placeholder="Search Google or enter URL"><button class="btn primary" id="browser-go">Go</button><button class="btn" id="browser-highlight">Save Highlight</button><button class="btn" id="browser-open-external">Open External</button><button class="btn" id="install-webapp">Install App</button><button class="btn" id="uninstall-webapp">Uninstall App</button></div>
    <div class="app-body" style="padding:8px;"><iframe id="browser-frame" src="https://www.google.com" referrerpolicy="no-referrer"></iframe></div>
  </section>

  <section id="pdf-window" class="window" style="left:150px;top:80px;width:min(1080px,94vw);height:min(730px,86vh);">
    <div class="titlebar" data-window="pdf-window"><div class="title">Bookshelf + PDF</div><div class="w-controls"><button class="ctrl min" data-close="pdf-window">—</button><button class="ctrl max" data-max="pdf-window">▢</button><button class="ctrl close" data-close="pdf-window">✕</button></div></div>
    <div class="toolbar">
<input id="pdf-upload" type="file" accept="application/pdf">
<input id="book-title" class="field" placeholder="Book title">

<button class="btn primary" id="add-book">Add Book</button>

<button class="btn" id="pdf-prev">◀ Page</button>
<button class="btn" id="pdf-next">Page ▶</button>

<button class="btn" id="pdf-zoom-in">Zoom +</button>
<button class="btn" id="pdf-zoom-out">Zoom −</button>

<button class="btn" id="pdf-fullscreen">Fullscreen</button>

<button class="btn" id="pdf-highlight">Save Highlight</button>
</div>
    <div class="app-body split"><aside class="panel" id="bookshelf" style="overflow:auto;"></aside><section class="panel" style="padding:8px;"><div id="pdf-viewer-container" style="width:100%;height:100%;overflow:auto;background:#111;">
  <canvas id="pdf-canvas"></canvas>
</div></section></div>
  </section>

  <section id="studio-window" class="window" style="left:180px;top:90px;width:min(920px,94vw);height:min(690px,84vh);">
    <div class="titlebar" data-window="studio-window"><div class="title">Study Studio</div><div class="w-controls"><button class="ctrl min" data-close="studio-window">—</button><button class="ctrl max" data-max="studio-window">▢</button><button class="ctrl close" data-close="studio-window">✕</button></div></div>
    <div class="toolbar"><button class="btn" id="studio-clear">Clear</button><button class="btn" id="studio-add-sticky">Add Sticky</button><button class="btn primary" id="studio-save">Save Studio</button></div>
    <div class="app-body split"><section class="panel" style="position:relative;overflow:hidden;"><canvas id="studio-canvas" style="width:100%;height:100%;display:block;background:white;"></canvas></section><aside id="studio-stickies" class="panel" style="overflow:auto;"></aside></div>
  </section>

  <section id="vault-window" class="window" style="left:220px;top:110px;width:min(700px,92vw);height:min(580px,78vh);">
    <div class="titlebar" data-window="vault-window"><div class="title">Important Vault</div><div class="w-controls"><button class="ctrl min" data-close="vault-window">—</button><button class="ctrl max" data-max="vault-window">▢</button><button class="ctrl close" data-close="vault-window">✕</button></div></div>
    <div class="toolbar"><input id="vault-input" class="field" style="flex:1;" placeholder="Save important point instantly"><button class="btn primary" id="vault-add">Save</button></div>
    <div class="app-body panel" id="vault-list"></div>
  </section>

  <section id="settings-window" class="window" style="left:150px;top:82px;width:min(920px,94vw);height:min(700px,84vh);">
    <div class="titlebar" data-window="settings-window"><div class="title">Settings</div><div class="w-controls"><button class="ctrl min" data-close="settings-window">—</button><button class="ctrl max" data-max="settings-window">▢</button><button class="ctrl close" data-close="settings-window">✕</button></div></div>
    <div class="app-body" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <div class="panel" style="padding:9px;display:flex;flex-direction:column;gap:8px;">
        <h4 style="margin:0;">Theme & Visuals</h4>
        <label>Wallpaper URL <input id="set-wallpaper" class="field" placeholder="https://..."></label>
        <label>Accent color <input id="set-accent" class="field" type="color"></label>
        <label>Glass opacity <input id="set-glass" class="field" type="range" min="25" max="85"></label>
        <label>UI font size <input id="set-font-size" class="field" type="range" min="11" max="18"></label>
        <label>Window radius <input id="set-radius" class="field" type="range" min="6" max="16"></label>
        <label>UI font family
          <select id="set-font-family" class="field">
            <option value='"Segoe UI", "Inter", sans-serif'>Segoe UI</option>
            <option value='"Inter", "Segoe UI", sans-serif'>Inter</option>
            <option value='"Arial", sans-serif'>Arial</option>

  <div id="toast" style="position:fixed;right:14px;top:14px;z-index:13000;display:none;max-width:380px;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.25);background:rgba(13,20,37,.9);color:#fff;"></div>

  <div id="taskbar" class="glass">
    <div id="tb-left"><button class="tb-btn" id="tb-start" title="Start">⊞</button><button class="tb-btn" id="tb-show-desktop" title="Show desktop">🖥️</button><button class="tb-btn" id="tb-annot" title="Draw on screen">✏️</button></div>
    <div id="tb-center">
      <button class="tb-btn" data-open="dashboard-window" title="Dashboard">📊</button>
      <button class="tb-btn" data-open="notes-window" title="Notes">📝</button>
      <button class="tb-btn" data-open="planner-window" title="Planner">📅</button>
      <button class="tb-btn" data-open="browser-window" title="Browser">🌐</button>
      <button class="tb-btn" data-open="pdf-window" title="Bookshelf">📚</button>
      <button class="tb-btn" data-open="studio-window" title="Studio">🖊️</button>
      <button class="tb-btn" data-open="vault-window" title="Vault">⭐</button>
      <button class="tb-btn" data-open="settings-window" title="Settings">⚙️</button>
    </div>
    <div id="tb-right"><button class="tb-btn" id="tb-quick-note" title="Quick note">🗒️</button><div class="pill" id="space-pill">Space</div><div class="pill" id="status-pill">Saved</div><div class="pill" id="clock-pill"></div><button class="tb-btn" id="btn-login" title="Login">👤</button><button class="tb-btn" id="btn-logout" title="Logout" style="display:none;">⇦</button></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAPzgwYDQQqR4y8aRcu8BmXfhYoLPXDuVM",
      authDomain: "forclearpcm.firebaseapp.com",
      projectId: "forclearpcm",
      storageBucket: "forclearpcm.firebasestorage.app",
      messagingSenderId: "594895089425",
      appId: "1:594895089425:web:65e09f36f7f519f8578fdb",
      measurementId: "G-FM5Y4M0HB0"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const db = getFirestore(app);

    const LOCAL_KEY = 'studyos11-pro-guest';

    const CORE_APPS = [
      { id:'dashboard-window', name:'Dashboard', icon:'📊' },
      { id:'notes-window', name:'Notes', icon:'📝' },
      { id:'planner-window', name:'Planner', icon:'📅' },
      { id:'browser-window', name:'Browser', icon:'🌐' },
      { id:'pdf-window', name:'Bookshelf', icon:'📚' },
      { id:'studio-window', name:'Studio', icon:'🖊️' },
      { id:'vault-window', name:'Vault', icon:'⭐' },
      { id:'settings-window', name:'Settings', icon:'⚙️' }
    ];

    const $ = id => document.getElementById(id);
    const el = {
      desktop: $('desktop'), startMenu: $('start-menu'), startSearch: $('start-search'), startGrid: $('start-grid'),
      spaces: $('spaces'), recommendedList: $('recommended-list'), quickNotePop: $('quick-note-pop'), quickNoteText: $('quick-note-text'),
      notesList: $('notes-list'), noteTitle: $('note-title'), noteContent: $('note-content'), taskList: $('task-list'),
      notesHighlights: $('notes-highlights'),
      browserTabs: $('browser-tabs'), browserUrl: $('browser-url'), browserFrame: $('browser-frame'),
      studioCanvas: $('studio-canvas'), studioStickies: $('studio-stickies'), vaultList: $('vault-list'),
      status: $('status-pill'), clock: $('clock-pill'), spacePill: $('space-pill'),
      annotOverlay: $('annot-overlay'), annotCanvas: $('annot-canvas'), annotTools: $('annot-tools')
      ,toast: $('toast')
    };

    function showToast(msg, ms=2400) {
      el.toast.textContent = msg;
      el.toast.style.display = 'block';
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => el.toast.style.display = 'none', ms);
    }

    let currentUser = null;
    let saveTimer = null;
    let activeWindowId = '';

    function baseSpace(name='Physics') {
      return {
        name,
        notes: [{ id: crypto.randomUUID(), title: 'Welcome', content: 'Start writing your notes here.', updatedAt: Date.now() }],
        selectedNoteId: null,
        tasks: [],
        books: [],
        studio: { drawing:'', stickies:[] },
        vault: [],
        highlights: [],
        analytics: { appMinutes: {}, events: [] },
        browser: { tabs:[{ id: crypto.randomUUID(), title:'Google', url:'https://www.google.com' }], activeTabId:null },
        quickNotes: [],
        apps: CORE_APPS.map(a => ({ id: a.id, name: a.name, icon: a.icon, type:'core' })),
        windows: {}
      };
    }

    function baseState() {
      const sp = baseSpace('Physics');
      sp.selectedNoteId = sp.notes[0].id;
      sp.browser.activeTabId = sp.browser.tabs[0].id;
      return {
        currentSpace: 'Physics',
        spaceOrder: ['Physics','Chemistry','Mathematics'],
        spaces: {
          Physics: sp,
          Chemistry: { ...baseSpace('Chemistry'), selectedNoteId: null },
          Mathematics: { ...baseSpace('Mathematics'), selectedNoteId: null }
        },
        theme: {
          wallpaper: '', accent:'#4f8cff', glass:56, uiFontSize:13, radius:10,
          fontFamily:'"Segoe UI", "Inter", sans-serif'
        },
        prefs: {
          autosave: true,
          clickClose: true,
          openStartOnLoad: false,
          snap: true,
          homepage: 'https://www.wikipedia.org'
        },
        installedAppsGlobal: []
      };
    }

    function normalize(raw) {
      const b = baseState();
      const s = { ...b, ...(raw || {}) };
      s.spaceOrder = (s.spaceOrder?.length ? s.spaceOrder : b.spaceOrder).filter(Boolean);
      s.spaces = s.spaces || {};
      s.spaceOrder.forEach(name => {
        const base = baseSpace(name);
        const sp = { ...base, ...(s.spaces[name] || {}) };
        sp.notes = (sp.notes?.length ? sp.notes : base.notes).map(n => ({ ...n, updatedAt: n.updatedAt || Date.now() }));
        sp.selectedNoteId = sp.selectedNoteId && sp.notes.some(n => n.id === sp.selectedNoteId) ? sp.selectedNoteId : sp.notes[0]?.id || null;
        sp.tasks = sp.tasks || [];
        sp.books = sp.books || [];
        sp.studio = { drawing: sp.studio?.drawing || '', stickies: sp.studio?.stickies || [] };
        sp.vault = sp.vault || [];
        sp.highlights = sp.highlights || [];
        sp.analytics = { appMinutes: sp.analytics?.appMinutes || {}, events: sp.analytics?.events || [] };
        sp.quickNotes = sp.quickNotes || [];
        sp.apps = sp.apps?.length ? sp.apps : base.apps;
        const tabs = sp.browser?.tabs?.length ? sp.browser.tabs : [{ id: crypto.randomUUID(), title:'Google', url:(s.prefs?.homepage || 'https://www.google.com') }];
        sp.browser = { tabs, activeTabId: sp.browser?.activeTabId || tabs[0].id };
        if (!sp.browser.tabs.some(t => t.id === sp.browser.activeTabId)) sp.browser.activeTabId = sp.browser.tabs[0].id;
        sp.windows = sp.windows || {};
        s.spaces[name] = sp;
      });
      if (!s.spaceOrder.includes(s.currentSpace)) s.currentSpace = s.spaceOrder[0];
      s.theme = { ...b.theme, ...(s.theme || {}) };
      s.prefs = { ...b.prefs, ...(s.prefs || {}) };
      s.installedAppsGlobal = s.installedAppsGlobal || [];
      return s;
    }

    let state = normalize(null);
    const getSpace = () => state.spaces[state.currentSpace];

    function dayKey(ts=Date.now()) { return new Date(ts).toISOString().slice(0,10); }
    function logStudyEvent(type, payload={}) {
      const sp = getSpace();
      sp.analytics.events.unshift({ type, payload, at: Date.now() });
      sp.analytics.events = sp.analytics.events.slice(0, 300);
    }
    function addAppMinutes(appId, minutes=1) {
      if (!appId) return;
      const sp = getSpace();
      sp.analytics.appMinutes[appId] = Number(sp.analytics.appMinutes[appId] || 0) + minutes;
    }
    function addHighlight(source, text, meta='') {
      const t = (text || '').trim();
      if (!t) return;
      const sp = getSpace();
      sp.highlights.unshift({ id: crypto.randomUUID(), source, text: t, meta, at: Date.now() });
      sp.highlights = sp.highlights.slice(0, 400);
      logStudyEvent('highlight', { source });
      queueSave();
    }

    function totalTodayMinutes() {
      const sp = getSpace();
      const today = dayKey();
      const mins = sp.tasks.filter(t => t.done && dayKey(t.doneAt || t.at) === today).length * 5
        + sp.quickNotes.filter(n => dayKey(n.at) === today).length
        + Math.round(Object.values(sp.analytics.appMinutes || {}).reduce((a,b)=>a+b,0));
      return mins;
    }

    async function loadState(user) {
      if (!user) {
        try { return normalize(JSON.parse(localStorage.getItem(LOCAL_KEY) || 'null')); }
        catch { return normalize(null); }
      }
      const ref = doc(db, 'users', user.uid, 'studyos', 'state');
      const snap = await getDoc(ref);
      return normalize(snap.exists() ? snap.data()?.payload : null);
    }

    async function saveNow() {
      if (!state) return;
      el.status.textContent = 'Saving...';
      try {
        if (!currentUser) {
          localStorage.setItem(LOCAL_KEY, JSON.stringify(state));
          el.status.textContent = 'Saved local';
          return;
        }
        const ref = doc(db, 'users', currentUser.uid, 'studyos', 'state');
        await setDoc(ref, { payload: state, uid: currentUser.uid, updatedAt: serverTimestamp() }, { merge: true });
        el.status.textContent = 'Saved Firebase';
      } catch (err) {
        el.status.textContent = 'Save failed';
        showToast(`Save failed: ${err?.message || 'unknown error'}`, 4200);
      }
    }

    function queueSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveNow, 300);
    }

    function esc(v='') {
      return v.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }

    function applyTheme() {
      document.documentElement.style.setProperty('--accent', state.theme.accent || '#4f8cff');
      document.documentElement.style.setProperty('--glass-opacity', String((Number(state.theme.glass || 56))/100));
      document.documentElement.style.setProperty('--font-size-ui', `${Number(state.theme.uiFontSize || 13)}px`);
      document.documentElement.style.setProperty('--radius-win', `${Number(state.theme.radius || 10)}px`);
      document.documentElement.style.setProperty('--font-family-ui', state.theme.fontFamily || '"Segoe UI", "Inter", sans-serif');
      if (state.theme.wallpaper) document.documentElement.style.setProperty('--wallpaper', `url('${state.theme.wallpaper}')`);
    }

    function allAppEntries() {
      return getSpace().apps;
    }

    function renderSpaces() {
      el.spaces.innerHTML = state.spaceOrder.map(s => `<button class="space-chip ${s===state.currentSpace?'active':''}" data-space="${s}">${esc(s)}</button>`).join('');
      [...el.spaces.querySelectorAll('[data-space]')].forEach(n => n.onclick = () => switchSpace(n.dataset.space));
      el.spacePill.textContent = `Space: ${state.currentSpace}`;
    }

    function switchSpace(name) {
      persistWindowRects();
      state.currentSpace = name;
      renderAll();
      queueSave();
    }

    function renderDesktop() {
      el.desktop.innerHTML = allAppEntries().map(a => `
        <div class="desktop-icon" data-open="${a.id}">
          <div class="icon-edit" data-edit-icon="${a.id}" title="Edit icon">✎</div>
          <div class="tile">${a.icon || '📦'}</div>
          <div class="label">${esc(a.name)}</div>
        </div>
      `).join('');
      [...el.desktop.querySelectorAll('[data-open]')].forEach(n => n.onclick = e => {
        if (e.target.closest('[data-edit-icon]')) return;
        launchApp(n.dataset.open);
      });
      [...el.desktop.querySelectorAll('[data-edit-icon]')].forEach(n => n.onclick = e => {
        e.stopPropagation();
        const id = n.dataset.editIcon;
        const app = getSpace().apps.find(x => x.id === id);
        if (!app) return;
        const icon = prompt('New icon (emoji/text)', app.icon || '📦');
        if (icon == null) return;
        app.icon = icon.trim() || app.icon;
        const name = prompt('App name', app.name);
        if (name != null && name.trim()) app.name = name.trim();
        renderDesktop();
        renderStart(el.startSearch.value || '');
        queueSave();
      });
    }

    function renderStart(filter='') {
      const q = (filter || '').trim().toLowerCase();
      const noteHits = Object.values(state.spaces).flatMap(sp => sp.notes || []).filter(n => q && `${n.title} ${n.content}`.toLowerCase().includes(q)).slice(0, 6).map(n => ({ id:`note:${n.id}`, icon:'📄', name:`Note: ${n.title || 'Untitled'}` }));
      const apps = allAppEntries().filter(a => !q || a.name.toLowerCase().includes(q));
      const entries = [...apps, ...noteHits].slice(0, 18);
      el.startGrid.innerHTML = entries.map(a => `<div class="start-item" data-launch="${a.id}">${a.icon || '📦'}<div>${esc(a.name)}</div></div>`).join('');
      [...el.startGrid.querySelectorAll('[data-launch]')].forEach(n => n.onclick = () => {
        const id = n.dataset.launch;
        if (id.startsWith('note:')) {
          const noteId = id.slice(5);
          const targetSpace = state.spaceOrder.find(sp => (state.spaces[sp].notes || []).some(x => x.id === noteId));
          if (targetSpace) {
            state.currentSpace = targetSpace;
            state.spaces[targetSpace].selectedNoteId = noteId;
            renderAll();
            openWindow('notes-window');
          }
        } else {
          launchApp(id);
        }
        closePopups();
      });

      const rec = [...getSpace().notes].sort((a,b)=>b.updatedAt-a.updatedAt).slice(0, 5);
      el.recommendedList.innerHTML = rec.map(n => `<div class="rec-item" data-rec="${n.id}">${esc(n.title || 'Untitled')}<small style="display:block;opacity:.8;">Recent note</small></div>`).join('') || '<div class="rec-item">No recent notes</div>';
      [...el.recommendedList.querySelectorAll('[data-rec]')].forEach(n => n.onclick = () => {
        getSpace().selectedNoteId = n.dataset.rec;
        renderNotes();
        openWindow('notes-window');
        closePopups();
      });
    }

    function launchApp(id) {
      if (id.startsWith('webapp:')) {
        const app = getSpace().apps.find(a => a.id === id);
        if (!app) return;
        openWindow('browser-window');
        const tab = getActiveTab();
        tab.url = app.url;
        tab.title = app.name;
        renderBrowserTabs();
        loadActiveTab();
        queueSave();
        return;
      }
      openWindow(id);
    }

    function setActiveTaskbar(id='') {
      [...document.querySelectorAll('.tb-btn[data-open]')].forEach(b => b.classList.toggle('active', b.dataset.open === id));
    }

    function openWindow(id) {
      const w = $(id);
      if (!w) return;
      document.querySelectorAll('.window').forEach(x => x.classList.remove('active'));
      w.style.display = 'flex';
      w.classList.add('active');
      activeWindowId = id;
      const rect = getSpace().windows[id];
      if (rect) {
        w.style.left = rect.left;
        w.style.top = rect.top;
        w.style.width = rect.width;
        w.style.height = rect.height;
      }
      logStudyEvent('open-window', { id });
      setActiveTaskbar(id);
    }

    function closeWindow(id) {
      const w = $(id);
      if (!w) return;
      w.style.display = 'none';
      w.classList.remove('active');
      if (activeWindowId === id) activeWindowId = document.querySelector('.window.active')?.id || '';
      saveWindowRect(id);
      setActiveTaskbar(document.querySelector('.window.active')?.id || '');
    }

    function saveWindowRect(id) {
      const w = $(id);
      if (!w) return;
      getSpace().windows[id] = {
        left: w.style.left || `${w.offsetLeft}px`,
        top: w.style.top || `${w.offsetTop}px`,
        width: w.style.width || `${w.offsetWidth}px`,
        height: w.style.height || `${w.offsetHeight}px`
      };
    }

    function persistWindowRects() {
      document.querySelectorAll('.window').forEach(w => saveWindowRect(w.id));
    }

    function bindWindowUX() {
      document.querySelectorAll('.window').forEach(w => {
        ['n','s','e','w','ne','nw','se','sw'].forEach(dir => {
          const h = document.createElement('div');
          h.className = `resize-handle ${dir}`;
          h.dataset.resize = dir;
          w.appendChild(h);
        });
      });

      document.querySelectorAll('.titlebar').forEach(bar => {
        bar.addEventListener('mousedown', e => {
          if (e.target.closest('button,input,textarea,select,label')) return;
          const id = bar.dataset.window;
          const w = $(id);
          const sx = e.clientX, sy = e.clientY, sl = w.offsetLeft, st = w.offsetTop;
          const move = ev => {
            w.style.left = `${Math.max(0, sl + ev.clientX - sx)}px`;
            w.style.top = `${Math.max(0, st + ev.clientY - sy)}px`;
          };
          const up = () => {
            window.removeEventListener('mousemove', move);
            window.removeEventListener('mouseup', up);
            saveWindowRect(id);
            queueSave();
          };
          window.addEventListener('mousemove', move);
          window.addEventListener('mouseup', up);
        });
      });

      document.querySelectorAll('.resize-handle').forEach(h => {
        h.addEventListener('mousedown', e => {
          e.stopPropagation();
          const w = h.closest('.window');
          const dir = h.dataset.resize;
          const sx=e.clientX, sy=e.clientY, sl=w.offsetLeft, st=w.offsetTop, sw=w.offsetWidth, sh=w.offsetHeight;
          const move = ev => {
            let l=sl,t=st,ww=sw,hh=sh;
            if (dir.includes('e')) ww = Math.max(330, sw + ev.clientX - sx);
            if (dir.includes('s')) hh = Math.max(240, sh + ev.clientY - sy);
            if (dir.includes('w')) { ww = Math.max(330, sw - (ev.clientX - sx)); l = sl + (ev.clientX - sx); }
            if (dir.includes('n')) { hh = Math.max(240, sh - (ev.clientY - sy)); t = st + (ev.clientY - sy); }
            w.style.left = `${l}px`; w.style.top = `${t}px`; w.style.width = `${ww}px`; w.style.height = `${hh}px`;
          };
          const up = () => {
            window.removeEventListener('mousemove', move);
            window.removeEventListener('mouseup', up);
            saveWindowRect(w.id);
            queueSave();
          };
          window.addEventListener('mousemove', move);
          window.addEventListener('mouseup', up);
        });
      });

      document.querySelectorAll('[data-close]').forEach(b => b.onclick = () => closeWindow(b.dataset.close));
      document.querySelectorAll('[data-max]').forEach(b => b.onclick = () => {
        const id = b.dataset.max;
        const w = $(id);
        if (w.dataset.full === '1') {
          const r = JSON.parse(w.dataset.restore || '{}');
          if (r.left) {
            w.style.left=r.left; w.style.top=r.top; w.style.width=r.width; w.style.height=r.height;
          }
          w.dataset.full = '0';
        } else {
          w.dataset.restore = JSON.stringify({ left:w.style.left||`${w.offsetLeft}px`, top:w.style.top||`${w.offsetTop}px`, width:w.style.width||`${w.offsetWidth}px`, height:w.style.height||`${w.offsetHeight}px` });
          w.style.left='8px'; w.style.top='8px'; w.style.width='calc(100vw - 16px)'; w.style.height='calc(100vh - var(--taskbar-h) - 20px)';
          w.dataset.full='1';
        }
        saveWindowRect(id);
        queueSave();
      });

      document.querySelectorAll('.window').forEach(w => {
        w.addEventListener('mousedown', () => {
          document.querySelectorAll('.window').forEach(x => x.classList.remove('active'));
          w.classList.add('active');
          activeWindowId = w.id;
          setActiveTaskbar(w.id);
        });
      });
    }

    function renderNotes() {
      const sp = getSpace();
      const notes = [...sp.notes].sort((a,b)=>b.updatedAt-a.updatedAt);
      el.notesList.innerHTML = notes.map(n => `<div class="note-item ${n.id===sp.selectedNoteId?'active':''}" data-note="${n.id}"><div>${esc(n.title||'Untitled')}</div><small>${new Date(n.updatedAt).toLocaleString()}</small></div>`).join('');
      [...el.notesList.querySelectorAll('[data-note]')].forEach(n => n.onclick = () => {
        sp.selectedNoteId = n.dataset.note;
        renderNotes();
      });
      const cur = sp.notes.find(n => n.id === sp.selectedNoteId) || sp.notes[0];
      if (!cur) return;
      sp.selectedNoteId = cur.id;
      el.noteTitle.value = cur.title || '';
      el.noteContent.value = cur.content || '';
      renderHighlightsPanel();
    }

    function renderHighlightsPanel() {
      const sp = getSpace();
      el.notesHighlights.innerHTML = `<div style="padding:8px;font-weight:700;">Highlights</div>` + ((sp.highlights || []).slice(0, 12).map(h => `<div class="note-item" data-highlight="${h.id}"><div>${esc(h.text.slice(0,90))}</div><small>${esc(h.source)} • ${new Date(h.at).toLocaleString()}</small></div>`).join('') || '<div class="note-item">No highlights yet.</div>');
      [...el.notesHighlights.querySelectorAll('[data-highlight]')].forEach(n => n.onclick = () => {
        const h = sp.highlights.find(x => x.id === n.dataset.highlight);
        if (!h) return;
        const insert = `\n\n[HIGHLIGHT • ${h.source}]\n${h.text}\n`;
        el.noteContent.value = `${el.noteContent.value}${insert}`;
        saveCurrentNote();
      });
    }

    function saveCurrentNote() {
      const sp = getSpace();
      const cur = sp.notes.find(n => n.id === sp.selectedNoteId);
      if (!cur) return;
      cur.title = el.noteTitle.value;
      cur.content = el.noteContent.value;
      cur.updatedAt = Date.now();
      logStudyEvent('save-note', { title: cur.title || 'Untitled' });
      renderNotes();
      queueSave();
      el.status.textContent = 'Note saved';
    }

    function renderTasks() {
      const sp = getSpace();
      el.taskList.innerHTML = sp.tasks.map(t => `
        <div class="task-row">
          <input type="checkbox" data-toggle="${t.id}" ${t.done ? 'checked' : ''}>
          <div><div>${esc(t.title)}</div><small>${esc(t.subject || 'General')} ${t.due ? `• ${t.due}` : ''}</small></div>
          <span>${t.done ? '✅' : '⏳'}</span>
          <button class="btn" data-del="${t.id}">Delete</button>
        </div>
      `).join('');
      [...el.taskList.querySelectorAll('[data-toggle]')].forEach(n => n.onchange = () => {
        const t = sp.tasks.find(x => x.id === n.dataset.toggle);
        if (!t) return;
        t.done = n.checked;
        t.doneAt = Date.now();
        logStudyEvent('task-toggle', { title: t.title, done: t.done });
        renderTasks();
        queueSave();
      });
      [...el.taskList.querySelectorAll('[data-del]')].forEach(n => n.onclick = () => {
        sp.tasks = sp.tasks.filter(x => x.id !== n.dataset.del);
        renderTasks();
        queueSave();
      });
    }

    function getActiveTab() {
      const b = getSpace().browser;
      return b.tabs.find(t => t.id === b.activeTabId) || b.tabs[0];
    }

    function isKnownFrameBlocked(url='') {
      try {
        const h = new URL(url).hostname.toLowerCase();
        return ['google.com','chatgpt.com','openai.com','accounts.google.com','gemini.google.com','copilot.microsoft.com','perplexity.ai'].some(d => h === d || h.endsWith(`.${d}`));
      } catch { return false; }
    }

    function setBrowserBlockedMessage(url) {
      const html = `<!doctype html><html><body style="margin:0;font-family:Segoe UI,Arial,sans-serif;background:#0b1220;color:#e5e7eb;display:grid;place-items:center;height:100vh;"><div style="max-width:620px;padding:24px;text-align:center;"><h2 style="margin:0 0 10px;">This site blocks embedding</h2><p style="opacity:.9;line-height:1.5;">${url.replace(/</g,'&lt;')} cannot open inside an iframe due to browser security headers (X-Frame-Options/CSP). Use <b>Open External</b> for full access and login support.</p></div></body></html>`;
      el.browserFrame.src = `data:text/html;charset=utf-8,${encodeURIComponent(html)}`;
    }

    function renderBrowserTabs() {
      const b = getSpace().browser;
      el.browserTabs.innerHTML = b.tabs.map(t => `
        <div class="btab ${t.id===b.activeTabId?'active':''}" data-tab="${t.id}">
          <span class="name">${esc(t.title || 'Tab')}</span>
          <button class="close-tab" data-close-tab="${t.id}">✕</button>
        </div>
      `).join('');
      [...el.browserTabs.querySelectorAll('[data-tab]')].forEach(n => n.onclick = e => {
        if (e.target.closest('[data-close-tab]')) return;
        b.activeTabId = n.dataset.tab;
        renderBrowserTabs();
        loadActiveTab();
        queueSave();
      });
      [...el.browserTabs.querySelectorAll('[data-close-tab]')].forEach(n => n.onclick = e => {
        e.stopPropagation();
        if (b.tabs.length === 1) return;
        b.tabs = b.tabs.filter(t => t.id !== n.dataset.closeTab);
        if (!b.tabs.some(t => t.id === b.activeTabId)) b.activeTabId = b.tabs[0].id;
        renderBrowserTabs();
        loadActiveTab();
        queueSave();
      });
    }

    function loadActiveTab() {
      const tab = getActiveTab();
      if (!tab) return;
      el.browserUrl.value = tab.url;
      if (isKnownFrameBlocked(tab.url)) {
        setBrowserBlockedMessage(tab.url);
      } else {
        el.browserFrame.src = tab.url;
      }
    }

    function navigateBrowser(inputRaw) {
      let v = (inputRaw || '').trim();
      if (!v) return;
      if (!/^https?:\/\//i.test(v)) v = v.includes('.') && !v.includes(' ') ? `https://${v}` : `https://www.google.com/search?q=${encodeURIComponent(v)}`;
      const tab = getActiveTab();
      if (!tab) return;
      tab.url = v;
      tab.title = v.replace(/^https?:\/\//,'').slice(0, 30);
      logStudyEvent('navigate', { url: v.slice(0,120) });
      renderBrowserTabs();
      if (isKnownFrameBlocked(v)) {
        setBrowserBlockedMessage(v);
        window.open(v, '_blank');
      } else {
        loadActiveTab();
      }
      queueSave();
    }

    function renderBooks() {
      const sp = getSpace();
      el.bookshelf.innerHTML = sp.books.map(b => `<div class="book-item" data-book="${b.id}"><div>${esc(b.title)}</div><small>${new Date(b.addedAt).toLocaleDateString()}</small></div>`).join('') || '<div class="book-item">No books yet.</div>';
      [...el.bookshelf.querySelectorAll('[data-book]')].forEach(n => n.onclick = () => {
        const b = sp.books.find(x => x.id === n.dataset.book);
        if (b?.dataUrl) loadPDF(b.dataUrl);
      });
    }

    function renderStudio() {
      const sp = getSpace();
      el.studioStickies.innerHTML = sp.studio.stickies.map((s, i) => `<div class="sticky-item"><div>${esc(s.text)}</div><small>${new Date(s.at).toLocaleString()}</small><div><button class="btn" data-del-sticky="${i}">Delete</button></div></div>`).join('') || '<div class="sticky-item">No stickies yet.</div>';
      [...el.studioStickies.querySelectorAll('[data-del-sticky]')].forEach(n => n.onclick = () => {
        sp.studio.stickies.splice(Number(n.dataset.delSticky), 1);
        renderStudio();
        queueSave();
      });

      const c = el.studioCanvas;
      const r = c.getBoundingClientRect();
      c.width = Math.max(320, Math.floor(r.width));
      c.height = Math.max(220, Math.floor(r.height));
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0,0,c.width,c.height);
      if (sp.studio.drawing) {
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0, c.width, c.height);
        img.src = sp.studio.drawing;
      }
    }

    function persistStudioCanvas() {
      getSpace().studio.drawing = el.studioCanvas.toDataURL('image/png');
      queueSave();
    }

    function renderVault() {
      const sp = getSpace();
      el.vaultList.innerHTML = sp.vault.map((v,i) => `<div class="vault-item"><div>${esc(v.text)}</div><small>${new Date(v.at).toLocaleString()}</small><div><button class="btn" data-vault-del="${i}">Delete</button></div></div>`).join('') || '<div class="vault-item">No important items.</div>';
      [...el.vaultList.querySelectorAll('[data-vault-del]')].forEach(n => n.onclick = () => {
        sp.vault.splice(Number(n.dataset.vaultDel), 1);
        renderVault();
        queueSave();
      });
    }

    function renderDashboard() {
      const sp = getSpace();
      const today = totalTodayMinutes();
      const streak = today > 0 ? 1 : 0;
      $('m-today').textContent = `${today}m`;
      $('m-streak').textContent = `${streak}d`;
      $('m-tasks').textContent = String(sp.tasks.filter(t => t.done).length);
      $('m-vault').textContent = `${sp.vault.length} / H:${sp.highlights.length}`;
      $('daily-goal').value = String(Number(sp.dailyGoal || 120));
      const left = Math.max(0, Number(sp.dailyGoal || 120) - today);
      const topApp = Object.entries(sp.analytics.appMinutes || {}).sort((a,b)=>b[1]-a[1])[0];
      const topAppText = topApp ? `Top focus app: ${topApp[0].replace('-window','')} (${Math.round(topApp[1])}m)` : 'No app usage tracked yet.';
      $('coach-text').textContent = `${left ? `Need ${left} more minutes today.` : 'Goal achieved.'} ${topAppText}`;
      $('study-activity').innerHTML = (sp.analytics.events || []).slice(0,5).map(e => `<div class="panel" style="padding:6px;">${esc(e.type)} • ${new Date(e.at).toLocaleTimeString()}</div>`).join('') || '<div class="panel" style="padding:6px;">No activity yet.</div>';
    }

    function showStart() {
      el.startMenu.style.display = 'block';
      requestAnimationFrame(() => el.startMenu.classList.add('open'));
    }
    function hideStart() {
      el.startMenu.classList.remove('open');
      setTimeout(() => el.startMenu.style.display='none', 220);
    }
    function showQuickNote() {
      el.quickNotePop.style.display = 'block';
      requestAnimationFrame(() => el.quickNotePop.classList.add('open'));
    }
    function hideQuickNote() {
      el.quickNotePop.classList.remove('open');
      setTimeout(() => el.quickNotePop.style.display='none', 200);
    }
    function closePopups() {
      hideStart();
      hideQuickNote();
    }

    function bindAnnotationOverlay() {
      const c = el.annotCanvas;
      const ctx = c.getContext('2d');
      let drawing = false;
      let mode = 'pen';
      let size = 3;
      let color = '#ff0000';
      let lx = 0, ly = 0;

      function resizeAnnot() {
        c.width = window.innerWidth;
        c.height = window.innerHeight;
      }
      resizeAnnot();
      window.addEventListener('resize', resizeAnnot);

      c.addEventListener('mousedown', e => {
        drawing = true;
        lx = e.clientX; ly = e.clientY;
      });
      window.addEventListener('mouseup', () => drawing = false);
      c.addEventListener('mousemove', e => {
        if (!drawing) return;
        ctx.lineWidth = size;
        ctx.lineCap = 'round';
        if (mode === 'eraser') {
          ctx.globalCompositeOperation = 'destination-out';
          ctx.strokeStyle = 'rgba(0,0,0,1)';
        } else {
          ctx.globalCompositeOperation = 'source-over';
          ctx.strokeStyle = color;
        }
        ctx.beginPath();
        ctx.moveTo(lx, ly);
        ctx.lineTo(e.clientX, e.clientY);
        ctx.stroke();
        lx = e.clientX; ly = e.clientY;
      });

      $('annot-pen').onclick = () => mode = 'pen';
      $('annot-eraser').onclick = () => mode = 'eraser';
      $('annot-size').oninput = e => size = Number(e.target.value);
      $('annot-color').oninput = e => color = e.target.value;
      $('annot-clear').onclick = () => { ctx.clearRect(0,0,c.width,c.height); };
      $('annot-exit').onclick = () => {
        el.annotOverlay.style.display = 'none';
        el.annotTools.style.display = 'none';
      };
    }

    function bindEvents() {
      $('tb-start').onclick = () => {
        if (el.startMenu.style.display === 'block') hideStart();
        else { showStart(); renderStart(el.startSearch.value || ''); }
      };
      $('tb-quick-note').onclick = () => {
        if (el.quickNotePop.style.display === 'block') hideQuickNote();
        else showQuickNote();
      };
      $('tb-show-desktop').onclick = () => {
        document.querySelectorAll('.window').forEach(w => { w.style.display = 'none'; w.classList.remove('active'); });
        activeWindowId = '';
        setActiveTaskbar('');
      };
      $('tb-annot').onclick = () => {
        el.annotOverlay.style.display = 'block';
        el.annotTools.style.display = 'flex';
      };

      $('add-space').onclick = () => {
        const name = prompt('New space name?');
        if (!name?.trim()) return;
        const n = name.trim();
        if (state.spaceOrder.includes(n)) return;
        state.spaceOrder.push(n);
        const sp = baseSpace(n);
        sp.selectedNoteId = sp.notes[0].id;
        sp.browser.activeTabId = sp.browser.tabs[0].id;
        state.spaces[n] = sp;
        state.currentSpace = n;
        renderAll();
        queueSave();
      };
      $('rename-space').onclick = () => {
        const cur = state.currentSpace;
        const next = prompt('Rename space', cur);
        if (!next?.trim() || next.trim() === cur || state.spaceOrder.includes(next.trim())) return;
        const n = next.trim();
        state.spaces[n] = state.spaces[cur];
        delete state.spaces[cur];
        state.spaceOrder = state.spaceOrder.map(x => x === cur ? n : x);
        state.currentSpace = n;
        renderAll();
        queueSave();
      };
      $('delete-space').onclick = () => {
        if (state.spaceOrder.length <= 1) return;
        if (!confirm(`Delete space ${state.currentSpace}?`)) return;
        delete state.spaces[state.currentSpace];
        state.spaceOrder = state.spaceOrder.filter(x => x !== state.currentSpace);
        state.currentSpace = state.spaceOrder[0];
        renderAll();
        queueSave();
      };

      el.startSearch.oninput = () => renderStart(el.startSearch.value || '');

      [...document.querySelectorAll('.tb-btn[data-open]')].forEach(n => n.onclick = () => launchApp(n.dataset.open));

      $('btn-login').onclick = async () => signInWithPopup(auth, provider);
      $('btn-logout').onclick = async () => signOut(auth);

      $('sync-now').onclick = saveNow;
      $('open-desktop-from-dashboard').onclick = () => $('tb-show-desktop').click();

      $('quick-note-save').onclick = () => {
        const text = el.quickNoteText.value.trim();
        if (!text) return;
        const sp = getSpace();
        sp.quickNotes.unshift({ id: crypto.randomUUID(), text, at: Date.now() });
        sp.vault.unshift({ text, at: Date.now() });
        el.quickNoteText.value = '';
        addHighlight('quick-note', text, 'Quick note');
        renderVault();
        renderDashboard();
        logStudyEvent('quick-note', { len: text.length });
        queueSave();
      };

      $('note-new').onclick = () => {
        const sp = getSpace();
        const n = { id: crypto.randomUUID(), title:'', content:'', updatedAt: Date.now() };
        sp.notes.unshift(n);
        sp.selectedNoteId = n.id;
        renderNotes();
        queueSave();
      };
      $('note-delete').onclick = () => {
        const sp = getSpace();
        if (sp.notes.length <= 1) return;
        sp.notes = sp.notes.filter(n => n.id !== sp.selectedNoteId);
        sp.selectedNoteId = sp.notes[0].id;
        renderNotes();
        queueSave();
      };
      $('note-save').onclick = saveCurrentNote;
      $('note-highlight').onclick = () => {
        const start = el.noteContent.selectionStart || 0;
        const end = el.noteContent.selectionEnd || 0;
        if (end <= start) return;
        const selected = el.noteContent.value.slice(start, end);
        el.noteContent.setRangeText(`==${selected}==`, start, end, 'end');
        addHighlight('notes', selected, el.noteTitle.value || 'Untitled');
        saveCurrentNote();
      };
      $('pin-to-vault').onclick = () => {
        saveCurrentNote();
        const sp = getSpace();
        const cur = sp.notes.find(n => n.id === sp.selectedNoteId);
        if (!cur) return;
        sp.vault.unshift({ text: `${cur.title || 'Untitled'}: ${cur.content.slice(0, 250)}`, at: Date.now() });
        addHighlight('notes-pin', cur.title || 'Untitled', 'Pinned summary');
        renderVault();
        queueSave();
      };
      el.noteTitle.addEventListener('input', () => { if (state.prefs.autosave) saveCurrentNote(); });
      el.noteContent.addEventListener('input', () => { if (state.prefs.autosave) saveCurrentNote(); });

      $('task-add').onclick = () => {
        const t = $('task-title').value.trim();
        if (!t) return;
        getSpace().tasks.unshift({ id: crypto.randomUUID(), title:t, subject:$('task-subject').value.trim(), due:$('task-due').value || '', done:false, at:Date.now() });
        $('task-title').value = '';
        renderTasks();
        queueSave();
      };

      $('browser-new-tab').onclick = () => {
        const b = getSpace().browser;
        const t = { id: crypto.randomUUID(), title:'New Tab', url: state.prefs.homepage || 'https://www.google.com' };
        b.tabs.push(t);
        b.activeTabId = t.id;
        renderBrowserTabs();
        loadActiveTab();
        queueSave();
      };
      $('browser-go').onclick = () => navigateBrowser(el.browserUrl.value);
      $('browser-highlight').onclick = () => {
        const text = prompt('Save important point from this site:');
        if (!text?.trim()) return;
        const tab = getActiveTab();
        addHighlight('browser', text.trim(), tab?.url || '');
        getSpace().vault.unshift({ text: `[Web] ${text.trim()}`, at: Date.now() });
        renderVault();
      };
      el.browserUrl.addEventListener('keydown', e => e.key === 'Enter' && navigateBrowser(el.browserUrl.value));
      $('browser-open-external').onclick = () => {
        const url = getActiveTab()?.url;
        if (url) window.open(url, '_blank');
      };
      $('install-webapp').onclick = () => {
        const url = (el.browserUrl.value || '').trim();
        if (!url) return;
        let host = 'Web App';
        try { host = new URL(url).hostname.replace('www.',''); } catch {}
        const name = prompt('App name', host);
        if (!name?.trim()) return;
        const id = `webapp:${crypto.randomUUID()}`;
        getSpace().apps.push({ id, name: name.trim(), icon:'🌐', type:'webapp', url });
        logStudyEvent('install-app', { name: name.trim(), url });
        renderDesktop();
        renderStart(el.startSearch.value || '');
        queueSave();
      };
      $('uninstall-webapp').onclick = () => {
        const apps = getSpace().apps.filter(a => a.type === 'webapp');
        if (!apps.length) return alert('No installed apps in this space.');
        const picked = prompt(`Uninstall which app?\n${apps.map((a,i)=>`${i+1}. ${a.name}`).join('\n')}`);
        const idx = Number(picked) - 1;
        if (!Number.isInteger(idx) || idx < 0 || idx >= apps.length) return;
        const target = apps[idx];
        getSpace().apps = getSpace().apps.filter(a => a.id !== target.id);
        logStudyEvent('uninstall-app', { name: target.name });
        renderDesktop();
        renderStart(el.startSearch.value || '');
        queueSave();
      };

      $('add-book').onclick = async () => {
        const file = $('pdf-upload').files?.[0];
        if (!file) return;
        const title = $('book-title').value.trim() || file.name.replace(/\.pdf$/i, '');
        const dataUrl = await new Promise((resolve, reject) => {
          const fr = new FileReader();
          fr.onload = () => resolve(fr.result);
          fr.onerror = reject;
          fr.readAsDataURL(file);
        });
        const sp = getSpace();
        sp.books.unshift({ id: crypto.randomUUID(), title, dataUrl, addedAt: Date.now() });
        logStudyEvent('book-add', { title });
        renderBooks();
        loadPDF(dataUrl);
        queueSave();
      };
      $('pdf-highlight').onclick = () => {
        const text = prompt('Save important point from this PDF:');
        if (!text?.trim()) return;
        addHighlight('pdf', text.trim(), $('book-title').value || 'PDF');
        getSpace().vault.unshift({ text: `[PDF] ${text.trim()}`, at: Date.now() });
        renderVault();
      };

      let drawing = false;
      let lx = 0, ly = 0;
      const sctx = () => el.studioCanvas.getContext('2d');
      el.studioCanvas.addEventListener('mousedown', e => {
        drawing = true;
        const r = el.studioCanvas.getBoundingClientRect();
        lx = e.clientX - r.left; ly = e.clientY - r.top;
      });
      window.addEventListener('mouseup', () => { if (drawing) { drawing = false; persistStudioCanvas(); } });
      el.studioCanvas.addEventListener('mousemove', e => {
        if (!drawing) return;
        const r = el.studioCanvas.getBoundingClientRect();
        const x = e.clientX - r.left, y = e.clientY - r.top;
        const ctx = sctx();
        ctx.strokeStyle = '#1d4ed8';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(lx, ly);
        ctx.lineTo(x, y);
        ctx.stroke();
        lx = x; ly = y;
      });
      $('studio-clear').onclick = () => {
        const ctx = sctx();
        ctx.fillStyle = '#fff';
        ctx.fillRect(0,0,el.studioCanvas.width,el.studioCanvas.height);

        queueSave();

      });

    }

    function setAuthUI(user) {
      if (!user) {
        $('btn-login').style.display = 'inline-block';
        $('btn-logout').style.display = 'none';
      } else {
        $('btn-login').style.display = 'none';
        $('btn-logout').style.display = 'inline-block';
      }
    }

    bindWindowUX();
    bindEvents();
    bindAnnotationOverlay();

    setInterval(() => {
      el.clock.textContent = new Date().toLocaleString([], { hour:'2-digit', minute:'2-digit', day:'numeric', month:'short' });
      renderDashboard();
    }, 1000);

    setInterval(() => {
      if (!activeWindowId) return;
      addAppMinutes(activeWindowId, 0.25);
      if (Math.random() < 0.2) queueSave();
    }, 15000);

    onAuthStateChanged(auth, async user => {
      currentUser = user;
      setAuthUI(user);
      state = await loadState(user);
      renderAll();
      el.status.textContent = user ? 'Loaded Firebase' : 'Loaded local';
      // no apps open at start
      document.querySelectorAll('.window').forEach(w => { w.style.display='none'; w.classList.remove('active'); });
      activeWindowId = '';
      setActiveTaskbar('');
    });

    window.addEventListener('error', e => {
      showToast(`Runtime error: ${e.message}`);
    });
    window.addEventListener('unhandledrejection', e => {
      showToast(`Async error: ${e.reason?.message || e.reason || 'unknown'}`);
    });
      let pdfDoc = null;
let pdfPage = 1;
let pdfScale = 1.5;

const canvas = document.getElementById("pdf-canvas");
const ctx = canvas.getContext("2d");

async function loadPDF(url) {
  const loadingTask = pdfjsLib.getDocument(url);
  pdfDoc = await loadingTask.promise;
  pdfPage = 1;
  renderPage();
}

async function renderPage() {
  const page = await pdfDoc.getPage(pdfPage);

  const viewport = page.getViewport({ scale: pdfScale });

  canvas.height = viewport.height;
  canvas.width = viewport.width;

  const renderContext = {
    canvasContext: ctx,
    viewport: viewport
  };

  await page.render(renderContext);
}
    document.getElementById("pdf-next").onclick = () => {
  if (pdfPage >= pdfDoc.numPages) return;
  pdfPage++;
  renderPage();
};

document.getElementById("pdf-prev").onclick = () => {
  if (pdfPage <= 1) return;
  pdfPage--;
  renderPage();
};
    document.getElementById("pdf-zoom-in").onclick = () => {
  pdfScale += 0.2;
  renderPage();
};

document.getElementById("pdf-zoom-out").onclick = () => {
  pdfScale = Math.max(0.6, pdfScale - 0.2);
  renderPage();
};
    
  </script>
</body>
