<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StudyOS - Mac Edition</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        :root { --accent: #007AFF; --bg: url('https://wallpaperaccess.com/full/1385413.jpg'); }
        body, html { margin: 0; height: 100%; overflow: hidden; font-family: -apple-system, sans-serif; }
        
        .desktop {
            background: var(--bg) no-repeat center center fixed;
            background-size: cover;
            width: 100vw; height: 100vh;
            position: relative;
        }

        /* Mac-style Window */
        .window {
            position: absolute;
            width: 600px; height: 400px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
            overflow: hidden;
            resize: both;
        }

        .title-bar {
            background: rgba(230, 230, 230, 0.9);
            padding: 10px; cursor: move;
            display: flex; align-items: center;
        }

        .dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #FF5F56; } .yellow { background: #FFBD2E; } .green { background: #27C93F; }

        .content { flex: 1; padding: 15px; overflow-y: auto; }
        
        /* Sidebar/Dock Area */
        .dock {
            position: absolute; bottom: 10px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(15px);
            padding: 10px 20px; border-radius: 20px;
            display: flex; gap: 15px; border: 1px solid rgba(255,255,255,0.2);
        }

        .icon { width: 50px; height: 50px; cursor: pointer; transition: 0.2s; }
        .icon:hover { transform: scale(1.2) translateY(-10px); }

        textarea { width: 100%; height: 80%; border: none; background: transparent; font-size: 16px; outline: none; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="desktop" id="desktop">
    
    <div class="window" style="top: 50px; left: 50px;" id="notesWin">
        <div class="title-bar" onmousedown="dragElement(this.parentElement)">
            <div class="dots"><div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div></div>
            <span style="margin-left: 20px; font-weight: 600; color: #333;">Notes (Supports LaTeX)</span>
        </div>
        <div class="content">
            <textarea id="noteInput" placeholder="Type formulas here, e.g., $$x = \frac{-b \pm \sqrt{b^2-4ac}}{2a}$$"></textarea>
            <button onclick="renderMath()">Render LaTeX</button>
            <div id="mathPreview"></div>
        </div>
    </div>

    <div class="window" style="top: 100px; left: 400px; width: 800px; height: 500px;">
        <div class="title-bar" onmousedown="dragElement(this.parentElement)">
            <div class="dots"><div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div></div>
            <input type="text" id="urlBar" placeholder="https://google.com" style="margin-left: 15px; width: 70%; border-radius: 5px; border: 1px solid #ccc;">
            <button onclick="navigate()">Go</button>
        </div>
        <div class="content" style="padding:0;">
            <iframe id="browserFrame" src="https://www.wikipedia.org"></iframe>
        </div>
    </div>

    <div class="dock">
        <img class="icon" src="https://cdn-icons-png.flaticon.com/512/5968/5968292.png" onclick="alert('Open Notes')">
        <img class="icon" src="https://cdn-icons-png.flaticon.com/512/888/888846.png" onclick="alert('Open Chrome')">
        <img class="icon" src="https://cdn-icons-png.flaticon.com/512/1091/1091916.png" onclick="document.getElementById('fileInput').click()">
    </div>
    <input type="file" id="fileInput" style="display:none">
</div>

<script>
    // Dragging Logic
    function dragElement(elmnt) {
        var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        elmnt.onmousedown = dragMouseDown;

        function dragMouseDown(e) {
            e.preventDefault();
            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;
        }

        function elementDrag(e) {
            e.preventDefault();
            pos1 = pos3 - e.clientX;
            pos2 = pos4 - e.clientY;
            pos3 = e.clientX;
            pos4 = e.clientY;
            elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
            elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
        }

        function closeDragElement() {
            document.onmouseup = null;
            document.onmousemove = null;
        }
    }

    // LaTeX Rendering
    function renderMath() {
        const input = document.getElementById('noteInput').value;
        const preview = document.getElementById('mathPreview');
        preview.innerHTML = input;
        MathJax.typeset();
    }

    // Browser Navigation
    function navigate() {
        const url = document.getElementById('urlBar').value;
        document.getElementById('browserFrame').src = url;
    }
</script>

</body>
</html>
