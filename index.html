<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS Web Edition</title>
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --mac-radius: 12px;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --blur: blur(30px);
            --accent: #007AFF;
            --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        }

        * { box-sizing: border-box; font-family: var(--font-main); margin: 0; padding: 0; }

        body, html { 
            height: 100vh; width: 100vw; overflow: hidden;
            background: url('https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?q=80&w=2560&auto=format&fit=crop') center/cover no-repeat;
        }

        /* System Menu Bar */
        .menu-bar {
            height: 30px; width: 100%; background: rgba(0, 0, 0, 0.25); backdrop-filter: var(--blur);
            display: flex; align-items: center; padding: 0 20px; color: white; font-size: 13px; font-weight: 500;
            position: fixed; top: 0; z-index: 10000;
        }
        .menu-item { margin-right: 20px; cursor: pointer; }
        .menu-item.bold { font-weight: 700; }

        /* Window System */
        .window {
            position: absolute; background: rgba(255, 255, 255, 0.95); backdrop-filter: var(--blur);
            border-radius: var(--mac-radius); box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: none; flex-direction: column; overflow: hidden; border: 1px solid rgba(255,255,255,0.6);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .window.active { box-shadow: 0 40px 80px rgba(0,0,0,0.5); z-index: 5000 !important; }
        
        /* Title Bar & Traffic Lights */
        .title-bar {
            height: 52px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; cursor: default; border-bottom: 1px solid rgba(0,0,0,0.08); background: #f6f6f6;
        }
        .traffic-lights { display: flex; gap: 8px; width: 60px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        .close { background: #FF5F56; } .min { background: #FFBD2E; } .max { background: #27C93F; }
        .win-title { font-size: 13px; font-weight: 600; color: #333; flex: 1; text-align: center; margin-right: 60px; }

        /* App Contents */
        .app-content { flex: 1; display: flex; flex-direction: column; background: white; overflow: hidden; }

        /* Custom Quill Overrides for Mac Feel */
        .ql-toolbar.ql-snow { border: none !important; border-bottom: 1px solid #e0e0e0 !important; background: #fafafa; padding: 12px !important; }
        .ql-container.ql-snow { border: none !important; font-size: 15px; font-family: var(--font-main); }
        .ql-editor { padding: 30px; line-height: 1.6; }

        /* Browser UI */
        .safari-nav { display: flex; padding: 10px; background: #f0f0f0; border-bottom: 1px solid #ccc; gap: 10px; align-items: center; }
        .safari-url { flex: 1; padding: 6px 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 13px; outline: none; text-align: center; }
        .safari-url:focus { text-align: left; border-color: var(--accent); }
        .safari-btn { padding: 6px 12px; border-radius: 6px; border: none; background: #e0e0e0; cursor: pointer; font-size: 12px; }
        .safari-btn:hover { background: #d0d0d0; }

        /* Dock */
        .dock {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.4); border-radius: 24px;
            padding: 10px 15px; display: flex; gap: 15px; z-index: 10000; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .dock-icon { width: 55px; height: 55px; cursor: pointer; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 12px; }
        .dock-icon:hover { transform: scale(1.3) translateY(-12px); }
    </style>
</head>
<body>

<div class="menu-bar">
    <span class="menu-item bold" style="font-size: 16px;"></span>
    <span class="menu-item bold" id="active-app-name">Finder</span>
    <span class="menu-item">File</span>
    <span class="menu-item">Edit</span>
    <span class="menu-item">View</span>
    <span class="menu-item">Window</span>
    <span class="menu-item">Help</span>
    <span id="system-clock" style="margin-left: auto; font-weight: 500;"></span>
</div>

<div id="desktop-area" style="position: absolute; top: 30px; bottom: 0; left: 0; right: 0;">

    <div class="window" id="notes-app" style="width: 800px; height: 600px; top: 50px; left: 100px;">
        <div class="title-bar" onmousedown="focusWindow('notes-app'); dragElement(this.parentElement)">
            <div class="traffic-lights">
                <div class="dot close" onclick="closeWindow('notes-app')"></div>
                <div class="dot min"></div>
                <div class="dot max" onclick="maximizeWindow('notes-app')"></div>
            </div>
            <div class="win-title">Pro Notes</div>
        </div>
        <div class="app-content">
            <div style="padding: 15px 30px 0; background: #fafafa;">
                <input type="text" id="note-title" placeholder="Note Title" style="width: 100%; border: none; font-size: 24px; font-weight: 700; background: transparent; outline: none;">
            </div>
            <div id="editor-container" style="flex: 1;"></div>
        </div>
    </div>

    <div class="window" id="safari-app" style="width: 900px; height: 650px; top: 80px; left: 200px;">
        <div class="title-bar" onmousedown="focusWindow('safari-app'); dragElement(this.parentElement)">
            <div class="traffic-lights">
                <div class="dot close" onclick="closeWindow('safari-app')"></div>
                <div class="dot min"></div>
                <div class="dot max" onclick="maximizeWindow('safari-app')"></div>
            </div>
            <div class="win-title">Safari</div>
        </div>
        <div class="app-content">
            <div class="safari-nav">
                <button class="safari-btn" onclick="document.getElementById('safari-frame').src='https://duckduckgo.com'">Home</button>
                <input type="text" class="safari-url" id="url-input" value="duckduckgo.com" placeholder="Search or enter website name..." onkeydown="handleWebSearch(event)">
                <button class="safari-btn" onclick="openInNewTab()">Pop Out</button>
            </div>
            <iframe id="safari-frame" src="https://duckduckgo.com" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </div>

</div>

<div class="dock">
    <img class="dock-icon" src="https://upload.wikimedia.org/wikipedia/commons/3/30/macOS_Notes_icon.svg" onclick="openWindow('notes-app')">
    <img class="dock-icon" src="https://upload.wikimedia.org/wikipedia/commons/5/52/Safari_browser_logo.svg" onclick="openWindow('safari-app')">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAPzgwYDQQqR4y8aRcu8BmXfhYoLPXDuVM",
        authDomain: "forclearpcm.firebaseapp.com",
        projectId: "forclearpcm",
        storageBucket: "forclearpcm.firebasestorage.app",
        messagingSenderId: "313585574692",
        appId: "1:313585574692:web:d4e1262ce22c7cd0bb89b1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Initialize Rich Text Editor
    const quill = new Quill('#editor-container', {
        theme: 'snow',
        placeholder: 'Write your notes here... (Equations will render after saving)',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['image', 'code-block'],
                ['clean']
            ]
        }
    });

    // Auto-Save Logic (Saves HTML content directly to Firebase)
    let saveTimer;
    const saveToCloud = () => {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
            const title = document.getElementById('note-title').value;
            const content = quill.root.innerHTML; // Gets rich HTML
            await setDoc(doc(db, "study_os", "primary_note"), { title, content });
            
            // Re-render MathJax after saving to catch any new $$ equations typed
            if(window.MathJax) MathJax.typesetPromise();
        }, 1000);
    };

    quill.on('text-change', saveToCloud);
    document.getElementById('note-title').addEventListener('input', saveToCloud);

    // Load Note on Boot
    window.addEventListener('DOMContentLoaded', async () => {
        const snap = await getDoc(doc(db, "study_os", "primary_note"));
        if (snap.exists()) {
            document.getElementById('note-title').value = snap.data().title || "";
            quill.root.innerHTML = snap.data().content || "";
            if(window.MathJax) MathJax.typesetPromise();
        }
    });
</script>

<script>
    // --- WINDOW MANAGER ---
    let zIndex = 5000;

    function openWindow(id) {
        const win = document.getElementById(id);
        win.style.display = 'flex';
        focusWindow(id);
    }

    function closeWindow(id) {
        document.getElementById(id).style.display = 'none';
    }

    function focusWindow(id) {
        document.querySelectorAll('.window').forEach(w => w.classList.remove('active'));
        const win = document.getElementById(id);
        win.classList.add('active');
        zIndex++;
        win.style.zIndex = zIndex;
        document.getElementById('active-app-name').innerText = id === 'notes-app' ? 'Notes' : 'Safari';
    }

    // Window Dragging Logic
    function dragElement(elmnt) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        elmnt.onmousedown = dragMouseDown;

        function dragMouseDown(e) {
            if(e.target.classList.contains('dot')) return; // Don't drag if clicking buttons
            e.preventDefault();
            pos3 = e.clientX; pos4 = e.clientY;
            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;
        }
        function elementDrag(e) {
            e.preventDefault();
            pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
            pos3 = e.clientX; pos4 = e.clientY;
            elmnt.parentElement.style.top = (elmnt.parentElement.offsetTop - pos2) + "px";
            elmnt.parentElement.style.left = (elmnt.parentElement.offsetLeft - pos1) + "px";
        }
        function closeDragElement() {
            document.onmouseup = null; document.onmousemove = null;
        }
    }

    // --- BROWSER LOGIC ---
    function handleWebSearch(e) {
        if (e.key === 'Enter') {
            let query = e.target.value;
            if (!query.includes('.') || query.includes(' ')) {
                document.getElementById('safari-frame').src = `https://duckduckgo.com/?q=${encodeURIComponent(query)}&ia=web`;
            } else {
                if (!query.startsWith('http')) query = 'https://' + query;
                document.getElementById('safari-frame').src = query;
            }
        }
    }

    // Fallback for sites that block iframes
    function openInNewTab() {
        const currentSrc = document.getElementById('safari-frame').src;
        window.open(currentSrc, '_blank');
    }

    // --- SYSTEM CLOCK ---
    setInterval(() => {
        const now = new Date();
        document.getElementById('system-clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', weekday: 'short', month: 'short', day: 'numeric'});
    }, 1000);
</script>

</body>
</html>
