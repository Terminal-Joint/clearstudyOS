<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE/AEEE Study Hub</title>
    <style>
        :root {
            --apple-bg: #000000;
            --glass: rgba(255, 255, 255, 0.08);
            --accent: #0071e3;
            --card-border: rgba(255, 255, 255, 0.15);
        }

        body {
            background-color: var(--apple-bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Glassmorphism Navigation */
        nav {
            width: 90%;
            max-width: 1200px;
            padding: 15px 0;
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 40px;
        }

        .countdown-container {
            text-align: center;
            margin-bottom: 40px;
        }

        #timer {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            background: linear-gradient(180deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1200px;
        }

        /* Apple-style Cards */
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 25px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        h2 { font-size: 1.2rem; margin-top: 0; color: var(--accent); }

        /* File List Styling */
        #cloudFileList {
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        .file-item {
            background: rgba(255,255,255,0.05);
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-item:hover { background: rgba(255,255,255,0.1); }

        /* Inputs & Buttons */
        input[type="file"] { margin: 10px 0; color: #888; }
        
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
        }

        #docViewer {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 16px;
            margin-top: 20px;
            background: white;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <nav>JEE / AEEE 25-DAY SPRINT</nav>

    <div class="countdown-container">
        <div id="timer">Loading Countdown...</div>
    </div>

    <div class="grid">
        <div class="card">
            <h2>Cloud Vault</h2>
            <p style="font-size: 0.8rem; opacity: 0.6;">Upload PDFs or Images of notes</p>
            <input type="file" id="fileInput">
            <button onclick="uploadFile()" id="uploadBtn">Upload to Cloud</button>
            
            <div id="cloudFileList">
                </div>
        </div>

        <div class="card">
            <h2>Daily Focus</h2>
            <div id="taskList">
                <div class="file-item"><input type="checkbox"> Finish Physics Mock</div>
                <div class="file-item"><input type="checkbox"> Review Inorganic Tables</div>
                <div class="file-item"><input type="checkbox"> 50 Maths MCQs</div>
            </div>
        </div>

        <div class="card">
            <h2>Quick Search</h2>
            <input type="text" id="wikiQuery" placeholder="Search a concept..." 
                   style="width:80%; padding:10px; border-radius:10px; border:none; background:rgba(255,255,255,0.1); color:white;">
            <button onclick="searchWiki()" style="width:15%;">Go</button>
            <div id="wikiResult" style="font-size: 0.85rem; margin-top:15px; line-height:1.4;"></div>
        </div>
    </div>

    <div id="previewArea" class="card hidden" style="width: 90%; max-width: 1200px; margin-top: 20px;">
        <h2 id="viewingTitle">Document Viewer</h2>
        <iframe id="docViewer"></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, listAll } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPzgwYDQQqR4y8aRcu8BmXfhYoLPXDuVM",
            authDomain: "forclearpcm.firebaseapp.com",
            projectId: "forclearpcm",
            storageBucket: "forclearpcm.firebasestorage.app",
            messagingSenderId: "313585574692",
            appId: "1:313585574692:web:d4e1262ce22c7cd0bb89b1",
            measurementId: "G-PW32DTYBP8"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);

        // Upload to Firebase
        window.uploadFile = async () => {
            const file = document.getElementById('fileInput').files[0];
            const btn = document.getElementById('uploadBtn');
            if (!file) return alert("Select a file first!");

            btn.innerText = "Syncing...";
            const storageRef = ref(storage, 'notes/' + file.name);
            
            try {
                await uploadBytes(storageRef, file);
                alert("Cloud Synced!");
                location.reload();
            } catch (e) { alert("Error! Check Firebase Storage rules."); }
        };

        // Load files from Firebase
        window.loadFiles = async () => {
            const listRef = ref(storage, 'notes/');
            const container = document.getElementById('cloudFileList');
            try {
                const res = await listAll(listRef);
                res.items.forEach(async (item) => {
                    const url = await getDownloadURL(item);
                    const div = document.createElement('div');
                    div.className = 'file-item';
                    div.innerHTML = `<span>${item.name}</span> <span style="color:var(--accent)">View</span>`;
                    div.onclick = () => {
                        document.getElementById('docViewer').src = url;
                        document.getElementById('viewingTitle').innerText = item.name;
                        document.getElementById('previewArea').classList.remove('hidden');
                    };
                    container.appendChild(div);
                });
            } catch (e) { container.innerHTML = "Cloud empty or permissions needed."; }
        };

        window.loadFiles();
    </script>

    <script>
        // --- Countdown Logic ---
        function updateTimer() {
            const examDate = new Date();
            examDate.setDate(examDate.getDate() + 25); // Set target to 25 days from now
            
            setInterval(() => {
                const now = new Date();
                const diff = examDate - now;
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const m = Math.floor((diff / 1000 / 60) % 60);
                document.getElementById('timer').innerText = `${d}d ${h}h ${m}m Left`;
            }, 1000);
        }
        updateTimer();

        // --- Wiki Search ---
        async function searchWiki() {
            const query = document.getElementById('wikiQuery').value;
            const resDiv = document.getElementById('wikiResult');
            const response = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${query}`);
            const data = await response.json();
            resDiv.innerHTML = data.extract ? data.extract : "No summary found.";
        }
    </script>
</body>
</html>
