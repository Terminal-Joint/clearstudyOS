<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>macOS Sequoia</title>
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        :root {
            --mac-glass: rgba(255, 255, 255, 0.2);
            --mac-border: rgba(255, 255, 255, 0.3);
            --blur-strength: blur(40px) saturate(180%);
            --shadow-standard: 0 20px 50px rgba(0,0,0,0.3);
            --accent: #007AFF;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
        
        body, html { 
            margin: 0; height: 100vh; width: 100vw; overflow: hidden;
            /* Official macOS Sequoia Wallpaper */
            background: url('https://wallpapers.ispazio.net/wp-content/uploads/2024/06/macOS-Sequoia-Light.jpg') center/cover no-repeat;
        }

        /* Top Menu Bar (Cleaned) */
        .menu-bar {
            height: 28px; width: 100%; background: rgba(0, 0, 0, 0.15); backdrop-filter: var(--blur-strength);
            display: flex; align-items: center; padding: 0 15px; color: white; font-size: 13px;
            position: fixed; top: 0; z-index: 10000;
        }

        /* Desktop Shortcuts Layer */
        #desktop {
            position: absolute; inset: 28px 0 0 0; padding: 20px;
            display: grid; grid-template-columns: repeat(auto-fill, 100px);
            grid-template-rows: repeat(auto-fill, 110px); grid-auto-flow: column; gap: 10px;
        }

        .shortcut {
            width: 90px; height: 100px; display: flex; flex-direction: column; align-items: center;
            cursor: pointer; transition: background 0.2s; border-radius: 8px; padding-top: 10px;
        }
        .shortcut:hover { background: rgba(255,255,255,0.1); }
        .shortcut img, .shortcut .note-icon {
            width: 64px; height: 64px; border-radius: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .shortcut span { color: white; font-size: 12px; margin-top: 8px; text-shadow: 0 1px 3px rgba(0,0,0,0.8); text-align: center; }

        /* Window Styling */
        .window {
            position: absolute; background: rgba(255, 255, 255, 0.85); backdrop-filter: var(--blur-strength);
            border-radius: 12px; box-shadow: var(--shadow-standard); display: none; flex-direction: column;
            border: 0.5px solid var(--mac-border); overflow: hidden;
        }
        .window.active { z-index: 5000; box-shadow: 0 40px 100px rgba(0,0,0,0.5); }
        
        .title-bar {
            height: 40px; display: flex; align-items: center; padding: 0 12px; cursor: move;
            background: rgba(255, 255, 255, 0.1);
        }
        .traffic-lights { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.close { background: #FF5F56; } .dot.min { background: #FFBD2E; } .dot.max { background: #27C93F; }

        /* Custom Context Menu */
        #ctx-menu {
            position: fixed; display: none; background: rgba(255, 255, 255, 0.6); backdrop-filter: var(--blur-strength);
            border: 1px solid var(--mac-border); border-radius: 8px; padding: 5px; width: 200px; z-index: 11000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .ctx-item {
            padding: 6px 12px; font-size: 13px; color: #333; cursor: pointer; border-radius: 5px;
        }
        .ctx-item:hover { background: var(--accent); color: white; }

        /* Dock (Sequoia Style) */
        .dock-container {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.2); backdrop-filter: var(--blur-strength);
            padding: 8px; border-radius: 22px; display: flex; gap: 12px; border: 1px solid var(--mac-border);
        }
        .dock-icon { width: 54px; height: 54px; transition: transform 0.2s; cursor: pointer; }
        .dock-icon:hover { transform: scale(1.3) translateY(-10px); }
    </style>
</head>
<body oncontextmenu="return openCtx(event)">

<div class="menu-bar">
    <span style="font-weight: 900; margin-right: 15px;"></span>
    <b id="active-app-display">Finder</b>
    <span style="margin-left: 20px;">File</span>
    <span style="margin-left: 15px;">Edit</span>
    <span id="clock" style="margin-left: auto; font-weight: 500;"></span>
</div>

<div id="desktop"></div>

<div id="ctx-menu">
    <div class="ctx-item" onclick="createApp('note')">New Note App</div>
    <div class="ctx-item" onclick="createApp('site')">New Website App</div>
    <hr style="border: 0.5px solid rgba(0,0,0,0.1); margin: 5px 0;">
    <div class="ctx-item">Change Wallpaper</div>
</div>

<div class="window" id="notes-win" style="width: 800px; height: 550px; top: 100px; left: 150px;">
    <div class="title-bar" onmousedown="focusWin('notes-win'); dragWin(this.parentElement)">
        <div class="traffic-lights">
            <div class="dot close" onclick="closeWin('notes-win')"></div>
            <div class="dot min"></div>
            <div class="dot max"></div>
        </div>
        <input type="text" id="note-name" value="New Note" style="background:transparent; border:none; margin-left: 20px; font-weight: bold; font-size: 14px; outline:none;">
    </div>
    <div id="editor" style="flex:1; background: white;"></div>
</div>

<div class="window" id="safari-win" style="width: 1000px; height: 650px; top: 50px; left: 100px;">
    <div class="title-bar" onmousedown="focusWin('safari-win'); dragWin(this.parentElement)">
        <div class="traffic-lights"><div class="dot close" onclick="closeWin('safari-win')"></div><div class="dot min"></div><div class="dot max"></div></div>
        <input type="text" id="safari-url" placeholder="Search or URL" style="flex:1; margin:0 40px; background:rgba(0,0,0,0.05); border:1px solid rgba(0,0,0,0.1); border-radius:6px; padding:2px 10px; text-align:center;">
    </div>
    <iframe id="safari-frame" src="https://duckduckgo.com" style="flex:1; border:none; background:white;"></iframe>
</div>

<div class="dock-container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/30/macOS_Notes_icon.svg" class="dock-icon" onclick="openWin('notes-win')">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/52/Safari_browser_logo.svg" class="dock-icon" onclick="openWin('safari-win')">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { /* USE YOUR CONFIG FROM PREVIOUS STEP */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const quill = new Quill('#editor', { theme: 'snow', modules: { toolbar: [['bold', 'italic'], ['image', 'code-block']] } });
    
    // Create Apps/Desktop Icons
    window.createApp = async (type) => {
        const name = prompt(`Enter ${type} name:`);
        const target = type === 'site' ? prompt("Enter URL:") : "";
        const id = "app_" + Date.now();
        await setDoc(doc(db, "desktop_icons", id), { name, type, target, id });
        document.getElementById('ctx-menu').style.display = 'none';
    };

    // Real-time Desktop Sync
    onSnapshot(collection(db, "desktop_icons"), (snap) => {
        const desktop = document.getElementById('desktop');
        desktop.innerHTML = '';
        snap.forEach(doc => {
            const data = doc.data();
            const icon = data.type === 'note' ? 'https://upload.wikimedia.org/wikipedia/commons/3/30/macOS_Notes_icon.svg' : 'https://upload.wikimedia.org/wikipedia/commons/5/52/Safari_browser_logo.svg';
            desktop.innerHTML += `
                <div class="shortcut" onclick="launchApp('${data.id}', '${data.type}', '${data.target}')">
                    <img src="${icon}">
                    <span>${data.name}</span>
                </div>`;
        });
    });

    window.launchApp = (id, type, target) => {
        if(type === 'site') {
            openWin('safari-win');
            document.getElementById('safari-frame').src = target;
        } else {
            openWin('notes-win');
            // Logic to load specific note content from Firebase based on id
        }
    };
</script>

<script>
    // System Functionality
    function openCtx(e) {
        e.preventDefault();
        const menu = document.getElementById('ctx-menu');
        menu.style.display = 'block';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        return false;
    }

    document.onclick = () => document.getElementById('ctx-menu').style.display = 'none';

    function focusWin(id) {
        document.querySelectorAll('.window').forEach(w => w.classList.remove('active'));
        document.getElementById(id).style.display = 'flex';
        document.getElementById(id).classList.add('active');
        document.getElementById('active-app-display').innerText = id === 'notes-win' ? 'Notes' : 'Safari';
    }

    function closeWin(id) { document.getElementById(id).style.display = 'none'; }

    function dragWin(el) {
        let x = 0, y = 0;
        el.onmousedown = (e) => {
            if(e.target.tagName === 'INPUT') return;
            x = e.clientX; y = e.clientY;
            document.onmousemove = (e) => {
                el.style.top = (el.offsetTop - (y - e.clientY)) + "px";
                el.style.left = (el.offsetLeft - (x - e.clientX)) + "px";
                x = e.clientX; y = e.clientY;
            };
            document.onmouseup = () => document.onmousemove = null;
        };
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', weekday:'short', day:'numeric', month:'short'});
    }, 1000);
</script>
</body>
</html>
