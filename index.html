<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyOS 11</title>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    :root {
      --taskbar-h: 64px;
      --glass: rgba(18, 25, 46, 0.45);
      --glass-soft: rgba(255,255,255,0.12);
      --line: rgba(255,255,255,0.2);
      --text: #f6f8ff;
      --text-dim: #cfd8ff;
      --accent: #5b8cff;
      --ok: #2ec27e;
      --warn: #f0b429;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "SF Pro Display", "SF Pro Text", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }
    body {
      background:
        radial-gradient(120% 120% at 10% 10%, rgba(95, 137, 255, 0.4), transparent 45%),
        radial-gradient(100% 100% at 90% 20%, rgba(148, 88, 255, 0.35), transparent 50%),
        radial-gradient(100% 100% at 50% 100%, rgba(0, 186, 255, 0.25), transparent 40%),
        url('https://images.unsplash.com/photo-1639322537231-2f206e06af84?q=80&w=1932&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
    }
    .glass {
      background: var(--glass);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border: 1px solid var(--line);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    #desktop {
      position: absolute;
      inset: 12px 12px calc(var(--taskbar-h) + 12px) 12px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(98px, 1fr));
      grid-auto-rows: 110px;
      gap: 10px;
      align-content: start;
      overflow: auto;
    }
    .icon {
      width: 92px;
      justify-self: center;
      text-align: center;
      padding: 6px;
      border-radius: 14px;
      cursor: pointer;
    }
    .icon:hover { background: rgba(255,255,255,0.16); }
    .tile {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      margin: 0 auto;
      display: grid;
      place-items: center;
      font-size: 28px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.4);
    }
    .label { margin-top: 7px; font-size: 12px; text-shadow: 0 2px 6px rgba(0,0,0,.6); }

    #taskbar {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 10px;
      height: var(--taskbar-h);
      border-radius: 16px;
      z-index: 2000;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 14px;
    }
    #tb-left, #tb-right { display: flex; align-items: center; gap: 8px; }
    #tb-center { display: flex; gap: 8px; align-items: center; justify-content: center; }
    .tb-btn {
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      border-radius: 12px;
      min-width: 40px;
      height: 40px;
      padding: 0 10px;
      cursor: pointer;
      font-weight: 600;
    }
    .tb-btn:hover, .tb-btn.active { background: rgba(255,255,255,.16); border-color: rgba(255,255,255,.25); }
    .pill { padding: 7px 10px; border-radius: 10px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); font-size: 12px; }

    #start-menu {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 84px;
      width: min(760px, 95vw);
      border-radius: 18px;
      padding: 14px;
      z-index: 2100;
      display: none;
    }
    #start-search { width: 100%; padding: 11px 12px; border-radius: 12px; border: 1px solid var(--line); background: rgba(255,255,255,.15); color: white; }
    #start-grid { margin-top: 12px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
    .start-item { border: 1px solid var(--line); border-radius: 12px; padding: 9px; text-align: center; background: rgba(255,255,255,.08); cursor: pointer; font-size: 12px; }
    .start-item:hover { background: rgba(255,255,255,.17); }

    .window {
      position: absolute;
      display: none;
      flex-direction: column;
      min-width: 360px;
      min-height: 260px;
      width: min(980px, 92vw);
      height: min(720px, 84vh);
      left: 90px;
      top: 72px;
      border-radius: 18px;
      overflow: hidden;
      z-index: 100;
    }
    .window.active { z-index: 800; }
    .titlebar {
      height: 48px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      cursor: move;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.08);
    }
    .ctrl { width: 11px; height: 11px; border-radius: 50%; border: 0; cursor: pointer; }
    .close { background: #ff5f57; }
    .min { background: #febc2e; }
    .max { background: #28c840; }
    .title { font-weight: 700; font-size: 14px; color: white; }
    .grow { flex: 1; }

    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; border-bottom: 1px solid var(--line); background: rgba(255,255,255,.06); }
    .toolbar input, .toolbar select, .toolbar textarea, .field {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(255,255,255,.1);
      color: white;
      font: inherit;
      outline: none;
    }
    .btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,.12);
      color: white;
      padding: 8px 10px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn.primary { background: var(--accent); border-color: transparent; }

    .app-body { flex: 1; min-height: 0; overflow: auto; padding: 12px; }
    .split { display: grid; grid-template-columns: 280px 1fr; gap: 10px; height: 100%; }
    .panel { border: 1px solid var(--line); border-radius: 14px; background: rgba(255,255,255,.07); min-height: 0; }

    /* Notes */
    #notes-list { overflow: auto; max-height: 100%; }
    .note-item { padding: 10px; border-bottom: 1px solid rgba(255,255,255,.14); cursor: pointer; }
    .note-item.active { background: rgba(91, 140, 255, 0.28); }
    #note-title, #note-content { width: 100%; }
    #note-content { min-height: 320px; resize: vertical; }

    /* Dashboard */
    .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .card { border: 1px solid var(--line); border-radius: 14px; background: rgba(255,255,255,.08); padding: 12px; }
    .card b { font-size: 22px; }

    /* Planner */
    .task-row { display: grid; grid-template-columns: 28px 1fr auto auto; gap: 8px; align-items: center; padding: 9px; border-bottom: 1px solid rgba(255,255,255,.12); }

    /* Flashcards */
    .flash-card { min-height: 260px; border-radius: 16px; border: 1px solid var(--line); background: rgba(255,255,255,.08); padding: 16px; display: grid; place-items: center; text-align: center; }

    /* Quiz */
    .quiz-q { border: 1px solid var(--line); border-radius: 12px; padding: 10px; margin-bottom: 10px; background: rgba(255,255,255,.06); }

    /* Focus */
    .timer { font-size: 60px; font-weight: 800; letter-spacing: 2px; }

    @media (max-width: 980px) {
      .cards { grid-template-columns: repeat(2, 1fr); }
      .split { grid-template-columns: 1fr; }
      #start-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <main id="desktop"></main>

  <aside id="start-menu" class="glass">
    <input id="start-search" placeholder="Search apps and commands..." />
    <div id="start-grid"></div>
  </aside>

  <section id="dashboard-window" class="window glass">
    <div class="titlebar" data-window="dashboard-window">
      <button class="ctrl close" data-close="dashboard-window"></button><button class="ctrl min" data-close="dashboard-window"></button><button class="ctrl max" data-max="dashboard-window"></button>
      <span class="title">Dashboard</span><span class="grow"></span>
      <button id="daily-sync" class="btn">Sync now</button>
    </div>
    <div class="app-body">
      <div class="cards">
        <div class="card"><div>Today Focus</div><b id="metric-today-min">0m</b></div>
        <div class="card"><div>Study Streak</div><b id="metric-streak">0d</b></div>
        <div class="card"><div>Tasks Done</div><b id="metric-tasks">0</b></div>
        <div class="card"><div>Quiz Accuracy</div><b id="metric-quiz">0%</b></div>
      </div>
      <div class="panel" style="margin-top:12px;padding:12px;">
        <h3 style="margin:0 0 8px;">Learning Coach</h3>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
          <label>Daily Goal Minutes <input type="number" class="field" id="daily-goal" min="30" max="480" step="5" style="width:110px;"></label>
          <button class="btn primary" id="save-goal">Save goal</button>
          <button class="btn" id="open-focus">Start focus session</button>
        </div>
        <div id="coach-text" style="margin-top:8px;color:var(--text-dim);"></div>
      </div>
    </div>
  </section>

  <section id="notes-window" class="window glass" style="left:120px;top:84px;">
    <div class="titlebar" data-window="notes-window">
      <button class="ctrl close" data-close="notes-window"></button><button class="ctrl min" data-close="notes-window"></button><button class="ctrl max" data-max="notes-window"></button>
      <span class="title">Notes</span><span class="grow"></span>
      <button class="btn" id="note-new">New</button>
      <button class="btn" id="note-delete">Delete</button>
      <button class="btn primary" id="flashcards-from-note">Generate Flashcards</button>
    </div>
    <div class="app-body split">
      <aside class="panel" id="notes-list"></aside>
      <section class="panel" style="padding:10px;display:flex;flex-direction:column;gap:8px;">
        <input id="note-title" class="field" placeholder="Note title" />
        <textarea id="note-content" class="field" placeholder="Write with markdown, formulas like $F=ma$, and structured concepts."></textarea>
      </section>
    </div>
  </section>

  <section id="planner-window" class="window glass" style="left:160px;top:104px;width:min(760px,92vw);height:min(640px,78vh);">
    <div class="titlebar" data-window="planner-window">
      <button class="ctrl close" data-close="planner-window"></button><button class="ctrl min" data-close="planner-window"></button><button class="ctrl max" data-max="planner-window"></button>
      <span class="title">Planner</span>
    </div>
    <div class="toolbar">
      <input id="task-title" placeholder="Task" style="flex:1;">
      <input id="task-subject" placeholder="Subject" style="width:140px;">
      <input id="task-due" type="date">
      <button class="btn primary" id="task-add">Add Task</button>
    </div>
    <div class="app-body panel" id="task-list"></div>
  </section>

  <section id="flashcards-window" class="window glass" style="left:180px;top:120px;width:min(700px,90vw);height:min(560px,76vh);">
    <div class="titlebar" data-window="flashcards-window">
      <button class="ctrl close" data-close="flashcards-window"></button><button class="ctrl min" data-close="flashcards-window"></button><button class="ctrl max" data-max="flashcards-window"></button>
      <span class="title">Flashcards</span>
      <span class="grow"></span>
      <button class="btn" id="card-prev">Prev</button>
      <button class="btn" id="card-flip">Flip</button>
      <button class="btn" id="card-next">Next</button>
    </div>
    <div class="app-body" style="display:flex;flex-direction:column;gap:10px;">
      <div id="flash-card" class="flash-card">No cards yet. Generate from Notes.</div>
      <div style="display:flex;gap:8px;justify-content:center;">
        <button class="btn" data-rate="again">Again</button>
        <button class="btn" data-rate="hard">Hard</button>
        <button class="btn primary" data-rate="good">Good</button>
        <button class="btn" data-rate="easy">Easy</button>
      </div>
      <div id="card-meta" style="text-align:center;color:var(--text-dim);"></div>
    </div>
  </section>

  <section id="quiz-window" class="window glass" style="left:220px;top:80px;width:min(780px,92vw);height:min(620px,80vh);">
    <div class="titlebar" data-window="quiz-window">
      <button class="ctrl close" data-close="quiz-window"></button><button class="ctrl min" data-close="quiz-window"></button><button class="ctrl max" data-max="quiz-window"></button>
      <span class="title">Adaptive Quiz</span><span class="grow"></span>
      <button class="btn" id="quiz-generate">Generate Quiz</button>
      <button class="btn primary" id="quiz-submit">Submit</button>
    </div>
    <div class="app-body" id="quiz-body"></div>
  </section>

  <section id="focus-window" class="window glass" style="left:260px;top:120px;width:min(560px,92vw);height:min(500px,72vh);">
    <div class="titlebar" data-window="focus-window">
      <button class="ctrl close" data-close="focus-window"></button><button class="ctrl min" data-close="focus-window"></button><button class="ctrl max" data-max="focus-window"></button>
      <span class="title">Focus Timer</span>
    </div>
    <div class="app-body" style="display:grid;place-items:center;gap:12px;">
      <div class="timer" id="focus-timer">25:00</div>
      <div style="display:flex;gap:8px;">
        <button class="btn primary" id="focus-start">Start</button>
        <button class="btn" id="focus-pause">Pause</button>
        <button class="btn" id="focus-reset">Reset</button>
      </div>
      <div id="focus-state" style="color:var(--text-dim);">Ready</div>
    </div>
  </section>

  <div id="taskbar" class="glass">
    <div id="tb-left">
      <div class="pill" id="user-pill">Guest</div>
      <button class="tb-btn" id="btn-login">Login</button>
      <button class="tb-btn" id="btn-logout" style="display:none;">Logout</button>
    </div>
    <div id="tb-center">
      <button class="tb-btn" id="tb-start">⊞</button>
      <button class="tb-btn" data-open="dashboard-window">📊</button>
      <button class="tb-btn" data-open="notes-window">📝</button>
      <button class="tb-btn" data-open="planner-window">📅</button>
      <button class="tb-btn" data-open="flashcards-window">🗂️</button>
      <button class="tb-btn" data-open="quiz-window">🧠</button>
      <button class="tb-btn" data-open="focus-window">⏱️</button>
    </div>
    <div id="tb-right">
      <div class="pill" id="status-pill">Saved</div>
      <div class="pill" id="clock-pill"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAPzgwYDQQqR4y8aRcu8BmXfhYoLPXDuVM",
      authDomain: "forclearpcm.firebaseapp.com",
      projectId: "forclearpcm",
      storageBucket: "forclearpcm.firebasestorage.app",
      messagingSenderId: "594895089425",
      appId: "1:594895089425:web:65e09f36f7f519f8578fdb",
      measurementId: "G-FM5Y4M0HB0"
    };

    const app = initializeApp(firebaseConfig);
    try { getAnalytics(app); } catch {}
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const db = getFirestore(app);

    const LOCAL_KEY = 'studyos11-guest-state';
    const APPS = [
      { id:'dashboard-window', name:'Dashboard', icon:'📊' },
      { id:'notes-window', name:'Notes', icon:'📝' },
      { id:'planner-window', name:'Planner', icon:'📅' },
      { id:'flashcards-window', name:'Flashcards', icon:'🗂️' },
      { id:'quiz-window', name:'Adaptive Quiz', icon:'🧠' },
      { id:'focus-window', name:'Focus Timer', icon:'⏱️' }
    ];

    const el = {
      desktop: document.getElementById('desktop'),
      startMenu: document.getElementById('start-menu'),
      startGrid: document.getElementById('start-grid'),
      startSearch: document.getElementById('start-search'),
      status: document.getElementById('status-pill'),
      clock: document.getElementById('clock-pill'),
      userPill: document.getElementById('user-pill'),
      noteList: document.getElementById('notes-list'),
      noteTitle: document.getElementById('note-title'),
      noteContent: document.getElementById('note-content'),
      taskList: document.getElementById('task-list'),
      flashCard: document.getElementById('flash-card'),
      cardMeta: document.getElementById('card-meta'),
      quizBody: document.getElementById('quiz-body'),
      focusTimer: document.getElementById('focus-timer'),
      focusState: document.getElementById('focus-state')
    };

    let currentUser = null;
    let saveTimer = null;
    let flashIndex = 0;
    let flashBack = false;
    let quiz = [];
    let focusInterval = null;

    function baseState() {
      return {
        notes: [{ id: crypto.randomUUID(), title: 'Welcome', content: 'This is your study brain.\n\nWrite concepts and equations like $F=ma$.', updatedAt: Date.now() }],
        selectedNoteId: null,
        tasks: [],
        flashcards: [],
        quizHistory: [],
        analytics: { dailyGoalMin: 120, studyMinutesByDay: {}, completedFocusSessions: 0 },
        focus: { running: false, endAt: null, leftMs: 25 * 60 * 1000 },
        windows: {}
      };
    }

    function normalize(loaded) {
      const b = baseState();
      const s = { ...b, ...(loaded || {}) };
      s.notes = (loaded?.notes?.length ? loaded.notes : b.notes).map(n => ({ ...n, updatedAt: n.updatedAt || Date.now() }));
      s.selectedNoteId = loaded?.selectedNoteId && s.notes.some(n => n.id === loaded.selectedNoteId) ? loaded.selectedNoteId : s.notes[0].id;
      s.tasks = loaded?.tasks || [];
      s.flashcards = loaded?.flashcards || [];
      s.quizHistory = loaded?.quizHistory || [];
      s.analytics = { ...b.analytics, ...(loaded?.analytics || {}) };
      s.analytics.studyMinutesByDay = loaded?.analytics?.studyMinutesByDay || {};
      s.focus = { ...b.focus, ...(loaded?.focus || {}) };
      s.windows = loaded?.windows || {};
      return s;
    }

    let state = normalize(null);

    function dayKey(ts = Date.now()) { return new Date(ts).toISOString().slice(0, 10); }
    function markMinutes(min) {
      const k = dayKey();
      state.analytics.studyMinutesByDay[k] = Number(state.analytics.studyMinutesByDay[k] || 0) + Math.max(0, min);
    }
    function streakDays() {
      let days = 0;
      const d = new Date();
      d.setHours(0,0,0,0);
      while (true) {
        const key = d.toISOString().slice(0, 10);
        if ((state.analytics.studyMinutesByDay[key] || 0) <= 0) break;
        days++; d.setDate(d.getDate() - 1);
      }
      return days;
    }

    async function loadState(user) {
      if (!user) {
        try { return normalize(JSON.parse(localStorage.getItem(LOCAL_KEY) || 'null')); }
        catch { return normalize(null); }
      }
      const ref = doc(db, 'users', user.uid, 'studyos', 'state');
      const snap = await getDoc(ref);
      return normalize(snap.exists() ? snap.data()?.payload : null);
    }

    async function saveNow() {
      if (!state) return;
      el.status.textContent = 'Saving...';
      if (!currentUser) {
        localStorage.setItem(LOCAL_KEY, JSON.stringify(state));
        el.status.textContent = 'Saved (local)';
        return;
      }
      const ref = doc(db, 'users', currentUser.uid, 'studyos', 'state');
      await setDoc(ref, { payload: state, uid: currentUser.uid, updatedAt: serverTimestamp() }, { merge: true });
      el.status.textContent = 'Saved (Firebase)';
    }

    function queueSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveNow, 350);
    }

    function renderDesktop() {
      el.desktop.innerHTML = APPS.map(a => `
        <div class="icon" data-open="${a.id}">
          <div class="tile">${a.icon}</div>
          <div class="label">${a.name}</div>
        </div>
      `).join('');
      [...document.querySelectorAll('[data-open]')].forEach(n => n.onclick = () => openWindow(n.dataset.open));
    }

    function renderStart(filter='') {
      const q = filter.trim().toLowerCase();
      el.startGrid.innerHTML = APPS.filter(a => !q || a.name.toLowerCase().includes(q)).map(a => `<div class="start-item" data-open="${a.id}">${a.icon}<div>${a.name}</div></div>`).join('');
      [...el.startGrid.querySelectorAll('[data-open]')].forEach(n => n.onclick = () => { openWindow(n.dataset.open); el.startMenu.style.display = 'none'; });
    }

    function openWindow(id) {
      document.querySelectorAll('.window').forEach(w => w.classList.remove('active'));
      const w = document.getElementById(id);
      w.style.display = 'flex';
      w.classList.add('active');
      const rect = state.windows[id];
      if (rect) {
        w.style.left = rect.left; w.style.top = rect.top; w.style.width = rect.width; w.style.height = rect.height;
      }
    }

    function closeWindow(id) {
      const w = document.getElementById(id);
      w.style.display = 'none';
      w.classList.remove('active');
      saveWindowRect(id);
    }

    function saveWindowRect(id) {
      const w = document.getElementById(id);
      state.windows[id] = { left: w.style.left || `${w.offsetLeft}px`, top: w.style.top || `${w.offsetTop}px`, width: w.style.width || `${w.offsetWidth}px`, height: w.style.height || `${w.offsetHeight}px` };
      queueSave();
    }

    function bindWindowDrag() {
      document.querySelectorAll('.titlebar').forEach(bar => {
        bar.addEventListener('mousedown', e => {
          if (e.target.closest('button,input,select,textarea')) return;
          const id = bar.dataset.window;
          const w = document.getElementById(id);
          const sx = e.clientX, sy = e.clientY, sl = w.offsetLeft, st = w.offsetTop;
          const move = ev => { w.style.left = `${Math.max(0, sl + ev.clientX - sx)}px`; w.style.top = `${Math.max(0, st + ev.clientY - sy)}px`; };
          const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); saveWindowRect(id); };
          window.addEventListener('mousemove', move);
          window.addEventListener('mouseup', up);
        });
      });
      document.querySelectorAll('[data-close]').forEach(b => b.onclick = () => closeWindow(b.dataset.close));
      document.querySelectorAll('[data-max]').forEach(b => b.onclick = () => {
        const id = b.dataset.max, w = document.getElementById(id);
        if (w.dataset.full === '1') {
          const r = JSON.parse(w.dataset.restore || '{}');
          if (r.left) { w.style.left = r.left; w.style.top = r.top; w.style.width = r.width; w.style.height = r.height; }
          w.dataset.full = '0';
        } else {
          w.dataset.restore = JSON.stringify({ left:w.style.left||`${w.offsetLeft}px`, top:w.style.top||`${w.offsetTop}px`, width:w.style.width||`${w.offsetWidth}px`, height:w.style.height||`${w.offsetHeight}px` });
          w.style.left = '8px'; w.style.top = '8px'; w.style.width = 'calc(100vw - 16px)'; w.style.height = 'calc(100vh - var(--taskbar-h) - 24px)';
          w.dataset.full = '1';
        }
        saveWindowRect(id);
      });
    }

    function renderNotes() {
      const notes = [...state.notes].sort((a,b) => b.updatedAt - a.updatedAt);
      el.noteList.innerHTML = notes.map(n => `<div class="note-item ${n.id===state.selectedNoteId?'active':''}" data-note="${n.id}"><div>${escapeHtml(n.title||'Untitled')}</div><small>${new Date(n.updatedAt).toLocaleString()}</small></div>`).join('');
      [...el.noteList.querySelectorAll('[data-note]')].forEach(n => n.onclick = () => {
        state.selectedNoteId = n.dataset.note;
        const note = state.notes.find(x => x.id === state.selectedNoteId);
        el.noteTitle.value = note?.title || '';
        el.noteContent.value = note?.content || '';
        renderNotes();
      });
      const current = state.notes.find(n => n.id === state.selectedNoteId) || state.notes[0];
      if (current) {
        state.selectedNoteId = current.id;
        el.noteTitle.value = current.title || '';
        el.noteContent.value = current.content || '';
      }
    }

    function updateCurrentNote() {
      const n = state.notes.find(x => x.id === state.selectedNoteId);
      if (!n) return;
      n.title = el.noteTitle.value;
      n.content = el.noteContent.value;
      n.updatedAt = Date.now();
      markMinutes(2);
      renderNotes();
      queueSave();
    }

    function addTask() {
      const title = document.getElementById('task-title').value.trim();
      if (!title) return;
      state.tasks.unshift({ id: crypto.randomUUID(), title, subject: document.getElementById('task-subject').value.trim(), due: document.getElementById('task-due').value || '', done:false, createdAt: Date.now() });
      document.getElementById('task-title').value = '';
      renderTasks();
      queueSave();
    }

    function renderTasks() {
      el.taskList.innerHTML = state.tasks.map(t => `
        <div class="task-row">
          <input type="checkbox" data-toggle="${t.id}" ${t.done ? 'checked' : ''}>
          <div><div>${escapeHtml(t.title)}</div><small style="color:var(--text-dim)">${escapeHtml(t.subject || 'General')} ${t.due ? `• ${t.due}` : ''}</small></div>
          <span class="pill">${t.done ? 'Done' : 'Open'}</span>
          <button class="btn" data-del="${t.id}">Delete</button>
        </div>
      `).join('');
      [...el.taskList.querySelectorAll('[data-toggle]')].forEach(n => n.onchange = () => {
        const t = state.tasks.find(x => x.id === n.dataset.toggle);
        if (!t) return;
        t.done = n.checked;
        if (t.done) markMinutes(5);
        renderTasks();
        queueSave();
      });
      [...el.taskList.querySelectorAll('[data-del]')].forEach(n => n.onclick = () => {
        state.tasks = state.tasks.filter(x => x.id !== n.dataset.del);
        renderTasks();
        queueSave();
      });
    }

    function generateFlashcardsFromCurrentNote() {
      const n = state.notes.find(x => x.id === state.selectedNoteId);
      if (!n) return;
      const lines = n.content.split('\n').map(x => x.trim()).filter(Boolean);
      const cards = [];
      lines.forEach(line => {
        if (line.includes(':')) {
          const [front, ...rest] = line.split(':');
          const back = rest.join(':').trim();
          if (front.trim() && back) cards.push({ id: crypto.randomUUID(), front: front.trim(), back, dueAt: Date.now(), ease: 2.5, intervalDays: 1 });
        }
      });
      if (!cards.length) cards.push({ id: crypto.randomUUID(), front: n.title || 'Note summary', back: n.content.slice(0, 220) || 'Add more structured notes with key:value format.', dueAt: Date.now(), ease: 2.5, intervalDays: 1 });
      state.flashcards.unshift(...cards);
      flashIndex = 0; flashBack = false;
      renderFlashcards();
      openWindow('flashcards-window');
      markMinutes(5);
      queueSave();
    }

    function dueCards() {
      const now = Date.now();
      return state.flashcards.filter(c => (c.dueAt || 0) <= now);
    }

    function renderFlashcards() {
      const cards = dueCards();
      if (!cards.length) {
        el.flashCard.innerHTML = 'No due cards right now. Great job 🎉';
        el.cardMeta.textContent = `Total cards: ${state.flashcards.length}`;
        return;
      }
      flashIndex = ((flashIndex % cards.length) + cards.length) % cards.length;
      const c = cards[flashIndex];
      el.flashCard.innerHTML = flashBack ? escapeHtml(c.back) : `<b>${escapeHtml(c.front)}</b>`;
      if (window.MathJax?.typesetPromise) MathJax.typesetPromise([el.flashCard]);
      el.cardMeta.textContent = `Card ${flashIndex + 1}/${cards.length} • Ease ${Number(c.ease || 2.5).toFixed(2)}`;
    }

    function reviewCard(rating) {
      const cards = dueCards();
      if (!cards.length) return;
      const c = cards[flashIndex];
      if (!c) return;
      const map = { again: 0.5, hard: 1, good: 2, easy: 3 };
      const mult = map[rating] || 2;
      c.ease = Math.max(1.3, (c.ease || 2.5) + (rating === 'easy' ? 0.15 : rating === 'again' ? -0.2 : 0.05));
      c.intervalDays = Math.max(1, Math.round((c.intervalDays || 1) * mult * c.ease / 2));
      c.dueAt = Date.now() + c.intervalDays * 24 * 60 * 60 * 1000;
      flashBack = false;
      markMinutes(1);
      renderFlashcards();
      queueSave();
    }

    function makeQuiz() {
      const text = state.notes.map(n => `${n.title}. ${n.content}`).join('\n');
      const chunks = text.split(/[.!?\n]/).map(x => x.trim()).filter(x => x.length > 25).slice(0, 8);
      quiz = chunks.slice(0, 5).map((s, i) => {
        const distract = chunks[(i + 1) % chunks.length] || 'None';
        const options = [s, distract, s.split(' ').slice(0, 5).join(' ') + ' ...', 'Insufficient data'];
        for (let j = options.length - 1; j > 0; j--) {
          const k = Math.floor(Math.random() * (j + 1));
          [options[j], options[k]] = [options[k], options[j]];
        }
        return { q: `Which option best matches your note idea?`, a: s, options };
      });
      renderQuiz();
    }

    function renderQuiz() {
      if (!quiz.length) {
        el.quizBody.innerHTML = '<div class="panel" style="padding:12px;">No quiz yet. Click Generate Quiz.</div>';
        return;
      }
      el.quizBody.innerHTML = quiz.map((q, i) => `
        <div class="quiz-q">
          <b>Q${i+1}. ${q.q}</b>
          <div style="margin-top:8px;display:grid;gap:6px;">
            ${q.options.map((op, oi) => `<label><input type="radio" name="q-${i}" value="${oi}"> ${escapeHtml(op)}</label>`).join('')}
          </div>
        </div>
      `).join('');
    }

    function submitQuiz() {
      if (!quiz.length) return;
      let score = 0;
      quiz.forEach((q, i) => {
        const picked = document.querySelector(`input[name="q-${i}"]:checked`);
        if (!picked) return;
        if (q.options[Number(picked.value)] === q.a) score += 1;
      });
      state.quizHistory.unshift({ score, total: quiz.length, at: Date.now() });
      markMinutes(10);
      alert(`Quiz score: ${score}/${quiz.length}`);
      queueSave();
      renderDashboard();
    }

    function renderFocus() {
      const ms = state.focus.running ? Math.max(0, state.focus.endAt - Date.now()) : state.focus.leftMs;
      const m = String(Math.floor(ms / 60000)).padStart(2, '0');
      const s = String(Math.floor((ms % 60000) / 1000)).padStart(2, '0');
      el.focusTimer.textContent = `${m}:${s}`;
      if (ms === 0 && state.focus.running) {
        state.focus.running = false;
        state.focus.leftMs = 25 * 60 * 1000;
        state.analytics.completedFocusSessions += 1;
        markMinutes(25);
        el.focusState.textContent = 'Session complete ✅';
        queueSave();
      }
    }

    function renderDashboard() {
      const today = Number(state.analytics.studyMinutesByDay[dayKey()] || 0);
      const streak = streakDays();
      const done = state.tasks.filter(t => t.done).length;
      const totalQ = state.quizHistory.reduce((a, x) => a + x.total, 0) || 1;
      const scoreQ = state.quizHistory.reduce((a, x) => a + x.score, 0);
      document.getElementById('metric-today-min').textContent = `${today}m`;
      document.getElementById('metric-streak').textContent = `${streak}d`;
      document.getElementById('metric-tasks').textContent = String(done);
      document.getElementById('metric-quiz').textContent = `${Math.round((scoreQ / totalQ) * 100)}%`;
      document.getElementById('daily-goal').value = state.analytics.dailyGoalMin;
      const remain = Math.max(0, state.analytics.dailyGoalMin - today);
      document.getElementById('coach-text').textContent = remain === 0
        ? 'Daily goal achieved. Keep your review streak alive with flashcards.'
        : `You need ${remain} more minutes to hit your goal today. Recommended: 1 focus session + 10 card reviews.`;
    }

    function escapeHtml(v='') {
      return v.replaceAll('&', '&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }

    function bindEvents() {
      document.getElementById('tb-start').onclick = () => {
        el.startMenu.style.display = el.startMenu.style.display === 'block' ? 'none' : 'block';
        renderStart(el.startSearch.value);
      };
      el.startSearch.oninput = () => renderStart(el.startSearch.value);
      [...document.querySelectorAll('.tb-btn[data-open]')].forEach(n => n.onclick = () => openWindow(n.dataset.open));

      document.getElementById('btn-login').onclick = async () => signInWithPopup(auth, provider);
      document.getElementById('btn-logout').onclick = async () => signOut(auth);
      document.getElementById('daily-sync').onclick = saveNow;

      document.getElementById('note-new').onclick = () => {
        const n = { id: crypto.randomUUID(), title: '', content: '', updatedAt: Date.now() };
        state.notes.unshift(n); state.selectedNoteId = n.id;
        renderNotes(); queueSave();
      };
      document.getElementById('note-delete').onclick = () => {
        if (state.notes.length === 1) return;
        state.notes = state.notes.filter(n => n.id !== state.selectedNoteId);
        state.selectedNoteId = state.notes[0].id;
        renderNotes(); queueSave();
      };
      el.noteTitle.addEventListener('input', updateCurrentNote);
      el.noteContent.addEventListener('input', updateCurrentNote);
      document.getElementById('flashcards-from-note').onclick = generateFlashcardsFromCurrentNote;

      document.getElementById('task-add').onclick = addTask;

      document.getElementById('card-prev').onclick = () => { flashIndex--; flashBack = false; renderFlashcards(); };
      document.getElementById('card-next').onclick = () => { flashIndex++; flashBack = false; renderFlashcards(); };
      document.getElementById('card-flip').onclick = () => { flashBack = !flashBack; renderFlashcards(); };
      [...document.querySelectorAll('[data-rate]')].forEach(n => n.onclick = () => reviewCard(n.dataset.rate));

      document.getElementById('quiz-generate').onclick = makeQuiz;
      document.getElementById('quiz-submit').onclick = submitQuiz;

      document.getElementById('focus-start').onclick = () => {
        if (state.focus.running) return;
        state.focus.running = true;
        state.focus.endAt = Date.now() + state.focus.leftMs;
        el.focusState.textContent = 'Focus in progress...';
        queueSave();
      };
      document.getElementById('focus-pause').onclick = () => {
        if (!state.focus.running) return;
        state.focus.running = false;
        state.focus.leftMs = Math.max(0, state.focus.endAt - Date.now());
        el.focusState.textContent = 'Paused';
        queueSave();
      };
      document.getElementById('focus-reset').onclick = () => {
        state.focus.running = false;
        state.focus.leftMs = 25 * 60 * 1000;
        state.focus.endAt = null;
        el.focusState.textContent = 'Ready';
        renderFocus();
        queueSave();
      };

      document.getElementById('save-goal').onclick = () => {
        const goal = Number(document.getElementById('daily-goal').value || 120);
        state.analytics.dailyGoalMin = Math.max(30, Math.min(480, goal));
        renderDashboard();
        queueSave();
      };
      document.getElementById('open-focus').onclick = () => openWindow('focus-window');

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') el.startMenu.style.display = 'none';
      });
    }

    function renderAll() {
      renderDesktop();
      renderStart();
      renderNotes();
      renderTasks();
      renderFlashcards();
      renderQuiz();
      renderFocus();
      renderDashboard();
    }

    function setAuthUI(user) {
      if (!user) {
        el.userPill.textContent = 'Guest';
        document.getElementById('btn-login').style.display = 'inline-block';
        document.getElementById('btn-logout').style.display = 'none';
        return;
      }
      el.userPill.textContent = user.displayName || user.email || 'User';
      document.getElementById('btn-login').style.display = 'none';
      document.getElementById('btn-logout').style.display = 'inline-block';
    }

    bindWindowDrag();
    bindEvents();
    openWindow('dashboard-window');
    openWindow('notes-window');

    setInterval(() => {
      el.clock.textContent = new Date().toLocaleString([], { hour:'2-digit', minute:'2-digit', day:'numeric', month:'short' });
      renderFocus();
      renderDashboard();
    }, 1000);

    onAuthStateChanged(auth, async user => {
      currentUser = user;
      setAuthUI(user);
      state = await loadState(user);
      renderAll();
      el.status.textContent = user ? 'Loaded (Firebase)' : 'Loaded (local)';
    });
  </script>
</body>
</html>
