<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>macOS Studio - Custom Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --mac-glass: rgba(255, 255, 255, 0.7);
            --mac-radius: 12px;
            --accent: #007AFF;
        }

        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; font-family: -apple-system, sans-serif; 
            background: url('https://help.apple.com/assets/6656209581E0F57C6C0A1950/6656209881E0F57C6C0A195F/en_US/62f689c836d07466547190f890989f66.png') center/cover;
        }

        /* Top Menu Bar (Clean) */
        .system-bar {
            height: 28px; width: 100%; background: rgba(0,0,0,0.2); backdrop-filter: blur(20px);
            color: white; display: flex; align-items: center; padding: 0 15px; font-size: 13px; z-index: 10000;
        }

        /* Desktop Shortcuts */
        #desktop { width: 100%; height: 100%; position: relative; padding: 40px; display: flex; flex-direction: column; flex-wrap: wrap; gap: 20px; align-content: flex-start; }
        .shortcut { width: 80px; text-align: center; cursor: pointer; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5); font-size: 12px; transition: 0.2s; }
        .shortcut:hover { background: rgba(255,255,255,0.2); border-radius: 8px; }
        .shortcut img { width: 60px; height: 60px; border-radius: 14px; margin-bottom: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* Window System */
        .window {
            position: absolute; background: var(--mac-glass); backdrop-filter: blur(40px);
            border-radius: var(--mac-radius); box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            display: none; flex-direction: column; border: 1px solid rgba(255,255,255,0.4); overflow: hidden;
        }
        .window.active { z-index: 5000; box-shadow: 0 30px 80px rgba(0,0,0,0.6); }
        .title-bar { height: 38px; display: flex; align-items: center; padding: 0 12px; cursor: move; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; cursor: pointer; }
        
        /* App UI */
        .app-body { flex: 1; background: white; display: flex; flex-direction: column; }
        #editor { flex: 1; border: none; padding: 20px; font-size: 16px; outline: none; resize: none; }
        .browser-controls { display: flex; background: #f1f1f1; padding: 5px 10px; gap: 10px; border-bottom: 1px solid #ddd; }
        .url-input { flex: 1; border-radius: 4px; border: 1px solid #ccc; padding: 2px 10px; font-size: 12px; }

        /* Dock */
        .dock {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.3); backdrop-filter: blur(30px);
            padding: 8px 12px; border-radius: 20px; display: flex; gap: 12px; border: 1px solid rgba(255,255,255,0.3);
        }
        .dock img { width: 50px; height: 50px; cursor: pointer; transition: 0.2s; }
        .dock img:hover { transform: scale(1.3) translateY(-10px); }
    </style>
</head>
<body>

<div class="system-bar">
    <span style="font-weight: 800;"></span>&nbsp;&nbsp; <b>Desktop</b> &nbsp; Go &nbsp; Tools &nbsp; <span id="clock" style="margin-left:auto"></span>
</div>

<div id="desktop">
    <div class="shortcut" onclick="openWindow('notes-app')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/30/macOS_Notes_icon.svg">
        <div>JEE Notes</div>
    </div>
    <div class="shortcut" onclick="openWindow('browser-app')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/52/Safari_browser_logo.svg">
        <div>Study Web</div>
    </div>
</div>

<div class="window" id="notes-app" style="width: 600px; height: 450px; top: 100px; left: 150px;">
    <div class="title-bar" onmousedown="focusWin('notes-app'); dragWin(this.parentElement)">
        <div class="dot" style="background:#FF5F56" onclick="closeWin('notes-app')"></div>
        <div class="dot" style="background:#FFBD2E"></div>
        <div class="dot" style="background:#27C93F"></div>
        <span style="font-size: 12px; font-weight: 600; margin-left: 10px;">Notes Editor</span>
    </div>
    <div class="app-body">
        <input type="text" id="note-name" placeholder="Note Name (e.g. Physics)" style="border:none; border-bottom:1px solid #eee; padding:10px 20px; font-weight:bold; outline:none;">
        <textarea id="editor" placeholder="Write your notes here..."></textarea>
    </div>
</div>

<div class="window" id="browser-app" style="width: 800px; height: 550px; top: 150px; left: 300px;">
    <div class="title-bar" onmousedown="focusWin('browser-app'); dragWin(this.parentElement)">
        <div class="dot" style="background:#FF5F56" onclick="closeWin('browser-app')"></div>
        <div class="win-title" style="margin-left: 15px; font-size: 12px; font-weight: 600;">Safari Portal</div>
    </div>
    <div class="browser-controls">
        <input type="text" id="url-input" class="url-input" placeholder="Search DuckDuckGo (iframe-safe)..." value="https://duckduckgo.com">
        <button onclick="navigate()" style="font-size:10px; cursor:pointer;">Go</button>
        <button onclick="popOut()" style="font-size:10px; cursor:pointer; color:blue;">Pop Out</button>
    </div>
    <div class="app-body">
        <iframe id="web-view" src="https://duckduckgo.com" style="width:100%; height:100%; border:none;"></iframe>
    </div>
</div>

<div class="dock">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/30/macOS_Notes_icon.svg" onclick="openWindow('notes-app')">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/52/Safari_browser_logo.svg" onclick="openWindow('browser-app')">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAPzgwYDQQqR4y8aRcu8BmXfhYoLPXDuVM",
        authDomain: "forclearpcm.firebaseapp.com",
        projectId: "forclearpcm",
        storageBucket: "forclearpcm.firebasestorage.app",
        messagingSenderId: "313585574692",
        appId: "1:313585574692:web:d4e1262ce22c7cd0bb89b1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const editor = document.getElementById('editor');
    const nameInput = document.getElementById('note-name');

    // Load Last Active Note
    window.addEventListener('load', async () => {
        const snap = await getDoc(doc(db, "active_study", "last_session"));
        if (snap.exists()) {
            nameInput.value = snap.data().title;
            editor.value = snap.data().text;
        }
    });

    // Auto-Save every change
    let timer;
    const save = () => {
        clearTimeout(timer);
        timer = setTimeout(async () => {
            await setDoc(doc(db, "active_study", "last_session"), {
                title: nameInput.value,
                text: editor.value,
                updated: Date.now()
            });
            console.log("Cloud Saved!");
        }, 1000);
    };

    editor.addEventListener('input', save);
    nameInput.addEventListener('input', save);
</script>

<script>
    function openWindow(id) { document.getElementById(id).style.display = 'flex'; focusWin(id); }
    function closeWin(id) { document.getElementById(id).style.display = 'none'; }
    function focusWin(id) {
        document.querySelectorAll('.window').forEach(w => w.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function dragWin(el) {
        let nx = 0, ny = 0;
        el.onmousedown = (e) => {
            if(e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
            nx = e.clientX; ny = e.clientY;
            document.onmousemove = (e) => {
                el.style.top = (el.offsetTop - (ny - e.clientY)) + "px";
                el.style.left = (el.offsetLeft - (nx - e.clientX)) + "px";
                nx = e.clientX; ny = e.clientY;
            };
            document.onmouseup = () => { document.onmousemove = null; };
        };
    }

    function navigate() {
        let val = document.getElementById('url-input').value;
        if(!val.startsWith('http')) val = 'https://' + val;
        document.getElementById('web-view').src = val;
    }

    function popOut() {
        window.open(document.getElementById('web-view').src, '_blank');
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);
</script>
</body>
</html>
